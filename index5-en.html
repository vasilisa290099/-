function doCalc(pi){
  const data=S.p[pi];
  const d=parseInt(data.date.d),m=parseInt(data.date.m),y=parseInt(data.date.y);
  const errEl=document.getElementById('calc-err-'+pi);
  const btn=document.getElementById('calc-btn-'+pi);
  if(!d||!m||!y||m<1||m>12||d<1||d>31||y<1800||y>2100){
    if(errEl){errEl.style.display='block';errEl.textContent='Enter a valid date of birth';}
    return;
  }
  if(errEl)errEl.style.display='none';
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span> Analyzing system...';}
  setTimeout(()=>{
    try{
      const r=calcPlanets(y,m,d);
      const asp=findAspects(r.pos,r.signs);
      const profile=calcProfile(asp,r.signs,r.pos);
      const sections=generateNC(profile);
      const exp={};sections.forEach((_,i)=>{exp[i]=i<2;});
      S.p[pi].profile=profile;S.p[pi].sections=sections;S.p[pi].exp=exp;
      const area=document.getElementById('profile-area-'+pi);
      if(area){
        area.innerHTML=buildProfileArea(pi);
        area.scrollIntoView({behavior:'smooth',block:'start'});
      }
      if(btn){btn.disabled=false;btn.innerHTML='✦ Get Profile';}
      render();
    }catch(e){
      if(btn){btn.disabled=false;btn.innerHTML='✦ Get Profile';}
      if(errEl){errEl.style.display='block';errEl.textContent='Error: '+e.message;}
    }
  },700);
}

  const tr=S.tr[pi];
  const d=parseInt(tr.date.d),m=parseInt(tr.date.m),y=parseInt(tr.date.y);
  if(!d||!m||!y||m<1||m>12||d<1||d>31){S.tr[pi].err='Check date';S.tr[pi].res=null;}
  else{
    try{
      const r=calcPlanets(y,m,d);
      S.tr[pi].res=findTransitsNC(r.pos,S.p[pi].profile.pos);
      S.tr[pi].err='';
