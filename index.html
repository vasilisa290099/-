function getActiveRegions(regionsStr,p1,p2,pBrainMap){
  if(!regionsStr)return[];
  const seen=new Set(),result=[];
  const c1=PLANET_CLR[p1]||'#f59e0b',c2=PLANET_CLR[p2]||'#60a5fa';
  const p1str=pBrainMap[p1]||'',p2str=pBrainMap[p2]||'';
  Object.entries(BRAIN_REGIONS).forEach(([key,reg])=>{
    if(regionsStr.includes(key)){
      const pk=`${reg.x}-${reg.y}`;
      if(!seen.has(pk)){
        seen.add(pk);
        const inP1=p1str.includes(key),inP2=p2str.includes(key);
        let color=reg.color;
        if(inP1&&inP2)color='#e2e8f0';
        else if(inP1)color=c1;
        else if(inP2)color=c2;
        result.push({key,...reg,color});
      }
    }
  });
  return result;
}

const evLookup={};
evRaw.forEach(([p1,p2,aIdx,domains,trigger,shadow,light])=>{
  const key=`${p1}|||${p2}`;
  if(!evLookup[key])evLookup[key]={};
  evLookup[key][aIdx]={domains,trigger,shadow,light};
});
function getEventData(p1,p2,aIdx){
  return evLookup[`${p1}|||${p2}`]?.[aIdx]||evLookup[`${p2}|||${p1}`]?.[aIdx]||null;
}

function EventCard({ev}){
  if(!ev)return null;
  const domains=ev.domains.split('·').map(d=>d.trim()).filter(Boolean);
  const shadowItems=ev.shadow.split('·').map(s=>s.trim()).filter(Boolean);
  const lightItems=ev.light.split('·').map(l=>l.trim()).filter(Boolean);
  return(
    <div className="rounded-xl overflow-hidden border border-purple-200">
      {/* Header */}
      <div className="px-3 py-2 flex items-center gap-2" style={{background:'linear-gradient(90deg,#581c87,#7c3aed,#581c87)'}}>
        <span className="text-base">🌍</span>
        <span className="text-xs font-bold text-white tracking-wide uppercase">Событийность</span>
        <span className="text-purple-300 text-xs ml-1">· Как это проявляется в жизни</span>
      </div>
      <div className="p-3 space-y-3" style={{background:'#faf5ff'}}>
        {/* Domain badges */}
        <div className="flex flex-wrap gap-1">
          {domains.map(d=>{
            const icon=DOMAIN_ICONS[d]||'🔹';
            return(
              <span key={d} className="inline-flex items-center gap-1 text-purple-800 font-semibold rounded-full px-2 py-0.5 text-xs" style={{background:'#e9d5ff'}}>
                <span>{icon}</span>{d}
              </span>
            );
          })}
        </div>
        {/* Trigger */}
        <div className="flex items-start gap-2 bg-purple-100 rounded-lg px-3 py-2">
          <span className="text-sm">⚡</span>
          <div>
            <span className="text-xs font-bold text-purple-700">Триггер · </span>
            <span className="text-xs text-purple-800">{ev.trigger}</span>
          </div>
        </div>
        {/* Shadow & Light */}
        <div className="grid grid-cols-2 gap-2">
          <div className="rounded-lg overflow-hidden">
            <div className="px-2 py-1.5" style={{background:'#1c1917'}}>
              <p className="text-xs font-bold text-red-400 flex items-center gap-1">🌑 Тень</p>
            </div>
            <div className="px-2 py-2 space-y-1.5" style={{background:'#0c0a09'}}>
              {shadowItems.map((s,i)=>(
                <div key={i} className="flex items-start gap-1.5">
                  <span className="text-red-500 text-xs mt-0.5 shrink-0">▸</span>
                  <p className="text-xs text-red-300 leading-relaxed">{s}</p>
                </div>
              ))}
            </div>
          </div>
          <div className="rounded-lg overflow-hidden">
            <div className="px-2 py-1.5" style={{background:'#052e16'}}>
              <p className="text-xs font-bold text-emerald-400 flex items-center gap-1">☀️ Свет</p>
            </div>
            <div className="px-2 py-2 space-y-1.5" style={{background:'#022c22'}}>
              {lightItems.map((l,i)=>(
                <div key={i} className="flex items-start gap-1.5">
                  <span className="text-emerald-400 text-xs mt-0.5 shrink-0">▸</span>
                  <p className="text-xs text-emerald-300 leading-relaxed">{l}</p>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

const lookup={};
raw.forEach(([p1,p2,aIdx,regions,mechanism,flow,nt,experience])=>{
  const key=`${p1}|||${p2}`;
  if(!lookup[key])lookup[key]={};
  lookup[key][aIdx]={regions,mechanism,flow,nt,experience};
});
function getEntry(p1,p2,aIdx){return lookup[`${p1}|||${p2}`]?.[aIdx]||lookup[`${p2}|||${p1}`]?.[aIdx]||null;}

// ── APP ────────────────────────────────────────────────────────────────────
function App(){

                  <button key={p} onClick={()=>set(p)} disabled={p===other}

                    {pEmoji[p]} {p}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
        {/* Planet info cards */}
        <div className="grid grid-cols-2 gap-3">
          {[p1,p2].map(p=>(
            <div key={p} className={`rounded-xl p-3 border-2 ${pColorCard[p]}`}>
              <div className="flex items-center gap-2 mb-1">
                <span className={`w-6 h-6 rounded-full ${pBgBadge[p]} flex items-center justify-center text-white text-xs font-bold`}>{pEmoji[p]}</span>

              </div>

          <button onClick={()=>{setSelAspect(null);setExpanded(null);setVectorOpen({});}}

          </button>

            <button key={a.name} onClick={()=>{setSelAspect(selAspect===i?null:i);setExpanded(null);setVectorOpen({});}}

            const kineticTip=getKineticTip(p1,p2);
            const vd=getVectorData(p1,p2,aIdx);

                        <p className="text-xs text-gray-800 leading-relaxed">{entry.mechanism}</p>

                        <p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">→ Поток сигнала</p>

                    {/* Vector reversal */}
                    {isTense&&vd&&(
                      <div className="rounded-lg overflow-hidden border-2 border-gray-300">
                        <div className="px-3 py-2 flex items-center justify-between bg-gray-100">
                          <span className="text-xs font-bold text-gray-700 uppercase tracking-wide">↺ Разворот вектора</span>

                            onClick={e=>{e.stopPropagation();setVectorOpen(prev=>({...prev,[aIdx]:!prev[aIdx]}));}}

                            {isVOpen?'✓ Вектор внутренний':'⚠ Вектор внешний'}

                        </div>
                        <div className={`px-3 py-3 transition-all ${isVOpen?'bg-green-50':'bg-red-50'}`}>
                          {isVOpen?(
                            <div className="space-y-2">
                              <p className="text-xs font-semibold text-green-700">✓ После разворота:</p>
                              <p className="text-xs text-green-800 leading-relaxed">{vd.intText}</p>
                              <div className="mt-2 pt-2 border-t border-green-200">
                                <p className="text-xs font-semibold text-green-600">⚡ Практический шаг:</p>

                            </div>
