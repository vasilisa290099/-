const lookup = {};
raw.forEach(([p1,p2,aIdx,regions,mechanism,flow,nt,experience]) => {
  const key = `${p1}|||${p2}`;
  if (!lookup[key]) lookup[key] = {};
  lookup[key][aIdx] = {regions,mechanism,flow,nt,experience};
});

function getEntry(p1, p2, aIdx) {
  return lookup[`${p1}|||${p2}`]?.[aIdx] || lookup[`${p2}|||${p1}`]?.[aIdx] || null;
}

function App() {
  const [p1, setP1] = useState('Солнце');
  const [p2, setP2] = useState('Луна');
  const [selAspect, setSelAspect] = useState(null);
  const [expanded, setExpanded] = useState(null);

  const displayAspects = selAspect !== null ? [aspects[selAspect]] : aspects;

  return (
    <div className="min-h-screen bg-gray-950 text-gray-100">
      <div className="bg-gradient-to-r from-indigo-950 via-purple-950 to-indigo-950 border-b border-purple-800 px-4 py-4">
        <h1 className="text-center text-xl font-bold text-purple-200 tracking-wide">
          ⚡ Биохимический Резонанс
        </h1>
        <p className="text-center text-xs text-purple-400 mt-1">Планеты · Мозг · Нейромедиаторы · Аспекты</p>
      </div>

      <div className="max-w-4xl mx-auto px-3 py-4 space-y-4">

        <div className="grid grid-cols-2 gap-3">
          {[{label:'Планета 1', val: p1, set: setP1, other: p2}, {label:'Планета 2', val: p2, set: setP2, other: p1}].map(({label,val,set,other}) => (
            <div key={label} className="bg-gray-900 rounded-xl p-3 border border-gray-700">
              <p className="text-xs text-gray-400 mb-2 font-medium">{label}</p>
              <div className="flex flex-wrap gap-1">
                {planets.map(p => (
                  <button
                    key={p}
                    onClick={() => { if(p !== other) { set(p); setExpanded(null); } }}
                    disabled={p === other}
                    className={`px-2 py-1 rounded-lg text-xs font-medium border transition-all ${
                      p === val
                        ? pColor[p] + ' border-2 shadow-md scale-105'
                        : p === other
                        ? 'bg-gray-800 border-gray-700 text-gray-600 cursor-not-allowed'
                        : 'bg-gray-800 border-gray-600 text-gray-300 hover:border-gray-400'
                    }`}
                  >
                    {pEmoji[p]} {p}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>

        <div className="grid grid-cols-2 gap-3">
          {[p1, p2].map(p => (
            <div key={p} className={`rounded-xl p-3 border-2 ${pColor[p]}`}>
              <div className="flex items-center gap-2 mb-1">
                <span className={`w-6 h-6 rounded-full ${pBg[p]} flex items-center justify-center text-white text-xs font-bold`}>{pEmoji[p]}</span>
                <span className="font-bold text-sm">{p}</span>
              </div>
              <p className="text-xs opacity-80">🧠 {pBrain[p]}</p>
              <p className="text-xs opacity-70 mt-1">⚗️ {pNt[p]}</p>
            </div>
          ))}
        </div>

        <div className="flex flex-wrap gap-2 justify-center">
          <button
            onClick={() => { setSelAspect(null); setExpanded(null); }}
            className={`px-3 py-1 rounded-full text-xs font-medium transition-all ${selAspect === null ? 'bg-white text-gray-900' : 'bg-gray-800 text-gray-300 hover:bg-gray-700'}`}
          >
            Все аспекты
          </button>
          {aspects.map((a, i) => (
            <button
              key={a.name}
              onClick={() => { setSelAspect(selAspect === i ? null : i); setExpanded(null); }}
              className={`px-3 py-1 rounded-full text-xs font-medium transition-all ${selAspect === i ? a.badge + ' text-white' : 'bg-gray-800 text-gray-300 hover:bg-gray-700'}`}
            >
              {a.sym} {a.name} {a.deg}
            </button>
          ))}
        </div>

        <div className="space-y-3">
          {displayAspects.map((asp) => {
            const aIdx = aspects.indexOf(asp);
            const entry = getEntry(p1, p2, aIdx);
            const isExpanded = expanded === aIdx;
            if (!entry) return null;
            return (
              <div key={asp.name} className={`rounded-xl border border-gray-700 overflow-hidden ${asp.bg}`}>
                <button
                  onClick={() => setExpanded(isExpanded ? null : aIdx)}
                  className="w-full text-left px-4 py-3 flex items-center justify-between"
                >
                  <div className="flex items-center gap-3">
                    <span className={`${asp.badge} text-white text-lg w-9 h-9 rounded-full flex items-center justify-center font-bold shadow`}>
                      {asp.sym}
                    </span>
                    <div>
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="font-bold text-gray-900 text-sm">{asp.name}</span>
                        <span className="text-xs text-gray-500">{asp.deg}</span>
                        <span className="text-xs italic text-gray-500">{asp.desc}</span>
                      </div>
                      <p className="text-xs text-gray-600 mt-0.5">🧠 {entry.regions}</p>
                    </div>
                  </div>
                  <span className="text-gray-400 text-lg ml-2">{isExpanded ? '▲' : '▼'}</span>
                </button>

                <div className="px-4 pb-3">
                  <p className="text-xs text-gray-700 leading-relaxed">{entry.experience}</p>
                </div>

                {isExpanded && (
                  <div className="border-t border-gray-300 px-4 py-3 space-y-3">
                    <div className="grid grid-cols-1 gap-3">
                      <div className="bg-white bg-opacity-60 rounded-lg p-3">
                        <p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">⚙️ Механизм</p>
                        <p className="text-xs text-gray-800 leading-relaxed">{entry.mechanism}</p>
                      </div>
                      <div className="bg-white bg-opacity-60 rounded-lg p-3">
                        <p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">→ Поток сигнала</p>
                        <p className="text-xs text-gray-800 font-mono leading-relaxed">{entry.flow}</p>
                      </div>
                      <div className="bg-white bg-opacity-60 rounded-lg p-3">
                        <p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">⚗️ Нейромедиаторы</p>
                        <p className="text-xs text-gray-800">{entry.nt}</p>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        <div className="bg-gray-900 rounded-xl p-4 border border-gray-700">
          <p className="text-xs font-bold text-gray-400 uppercase mb-3">Легенда структур мозга</p>
          <div className="grid grid-cols-1 gap-1 text-xs text-gray-400">
            <div><span className="text-gray-300">ДМН</span> — Default Mode Network · сеть пассивного режима · центр «я»</div>
            <div><span className="text-gray-300">лПФК / пПФК</span> — лево/право дорсолатеральная Префронтальная Кора</div>
            <div><span className="text-gray-300">ПКК</span> — Передняя Поясная Кора · мониторинг ошибок</div>
            <div><span className="text-gray-300">ВТА</span> — Вентральная Тегментальная Область · дофамин</div>
            <div><span className="text-gray-300">ГГН-ось</span> — Гипоталамус-Гипофиз-Надпочечники · стресс</div>
            <div><span className="text-gray-300">РАС</span> — Ретикулярная Активирующая Система · сознание</div>
            <div><span className="text-gray-300">5-HT2A</span> — серотониновый рецептор типа 2A · мистика/растворение</div>
            <div><span className="text-gray-300">BDNF</span> — нейротрофический фактор · рост нейронов</div>
            <div><span className="text-gray-300">АХ</span> — Ацетилхолин · обучение, внимание, память</div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
