function NatalWheel({positions,natalAspects}){const cx=140,cy=140,R=110;const pOrder=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto'];const pEmojis={'Sun':'☀','Moon':'☽','Mercury':'☿','Venus':'♀','Mars':'♂','Jupiter':'♃','Saturn':'♄','Uranus':'⛢','Neptune':'♆','Pluto':'♇'};function lxy(lon,r){const a=(lon-90)*D2R;return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};}const signColors=['#ef4444','#f97316','#eab308','#22c55e','#f59e0b','#84cc16','#06b6d4','#3b82f6','#8b5cf6','#64748b','#0ea5e9','#10b981'];return(<svg viewBox="0 0 280 280" className="w-full max-w-xs mx-auto"><circle cx={cx} cy={cy} r={R+18} fill="#07031a" stroke="#1e1b4b" strokeWidth="1"/>{Array.from({length:12}).map((_,i)=>{const a1=(i*30-90)*D2R,a2=((i+1)*30-90)*D2R;const x1=cx+(R+2)*Math.cos(a1),y1=cy+(R+2)*Math.sin(a1);const x2=cx+(R+18)*Math.cos(a1),y2=cy+(R+18)*Math.sin(a1);const mx=cx+(R+10)*Math.cos((a1+a2)/2),my=cy+(R+10)*Math.sin((a1+a2)/2);return(<g key={i}><line x1={x1} y1={y1} x2={x2} y2={y2} stroke="#312e81" strokeWidth="0.5"/><text x={mx} y={my} textAnchor="middle" dominantBaseline="middle" fontSize="7" fill={signColors[i]} fontWeight="bold">{ZODIAC_SYM[i]}</text></g>);})}<circle cx={cx} cy={cy} r={R} fill="#050215" stroke="#312e81" strokeWidth="0.8"/><circle cx={cx} cy={cy} r={R*0.35} fill="#07031a" stroke="#1e1b4b" strokeWidth="0.5"/><line x1={cx-R} y1={cy} x2={cx+R} y2={cy} stroke="#4f46e5" strokeWidth="0.8" strokeDasharray="4,3" opacity="0.5"/><line x1={cx} y1={cy-R} x2={cx} y2={cy+R} stroke="#4f46e5" strokeWidth="0.8" strokeDasharray="4,3" opacity="0.5"/><text x="8" y={cy+1} textAnchor="start" dominantBaseline="middle" fontSize="7.5" fill="#a78bfa" fontWeight="900" fontFamily="system-ui">ASC</text><text x="265" y={cy+1} textAnchor="end" dominantBaseline="middle" fontSize="7.5" fill="#60a5fa" fontWeight="900" fontFamily="system-ui">DSC</text><text x={cx} y="10" textAnchor="middle" fontSize="7" fill="#fbbf24" fontWeight="700" fontFamily="system-ui">MC</text><text x={cx} y="272" textAnchor="middle" fontSize="7" fill="#34d399" fontWeight="700" fontFamily="system-ui">IC</text>{natalAspects.map((asp,k)=>{const xy1=lxy(positions[asp.p1],R*0.68),xy2=lxy(positions[asp.p2],R*0.68);return<line key={k} x1={xy1.x} y1={xy1.y} x2={xy2.x} y2={xy2.y} stroke={asp.ad.color} strokeWidth="0.8" opacity="0.55" strokeDasharray={asp.aspectIdx===3||asp.aspectIdx===4?"none":"3,2"}/>;})}{pOrder.map(p=>{const lon=positions[p];const{x,y}=lxy(lon,R*0.68);const cl=PLANET_CLR[p]||'#fff';return(<g key={p}><circle cx={x} cy={y} r={7} fill={cl} fillOpacity="0.25" stroke={cl} strokeWidth="1"/><text x={x} y={y} textAnchor="middle" dominantBaseline="middle" fontSize="8" fill={cl} fontWeight="bold">{pEmojis[p]}</text></g>);})}</svg>);}

const[natalData,setNatalData]=useState(null);
const[natalErr,setNatalErr]=useState('');
const[saveConfirm,setSaveConfirm]=useState('');
const[autoLoaded,setAutoLoaded]=useState(false);

useEffect(()=>{
try{const saved=localStorage.getItem('brBirthData');if(saved){const d=JSON.parse(saved);if(d.day)setBDay(d.day);if(d.month)setBMonth(d.month);if(d.year)setBYear(d.year);if(d.hour)setBHour(d.hour);setAutoLoaded(true);setTimeout(()=>setAutoLoaded(false),4000);}}catch(e){}
},[]);

function saveBirth(){try{localStorage.setItem('brBirthData',JSON.stringify({day:bDay,month:bMonth,year:bYear,hour:bHour}));setSaveConfirm('✅ Сохранено!');setTimeout(()=>setSaveConfirm(''),3000);}catch(e){setSaveConfirm('⚠ Недоступно');setTimeout(()=>setSaveConfirm(''),2000);}}
function clearBirth(){setBDay('');setBMonth('');setBYear('');setBHour('12');setNatalData(null);setNatalErr('');try{localStorage.removeItem('brBirthData');}catch(e){}setSaveConfirm('🗑️ Очищено');setTimeout(()=>setSaveConfirm(''),2000);}
function handleP1(p){if(p!==p2){setP1(p);setExpanded(null);setVectorOpen({});}}
function handleP2(p){if(p!==p1){setP2(p);setExpanded(null);setVectorOpen({});}}
function calcNatal(){const y=parseInt(bYear),m=parseInt(bMonth),d=parseInt(bDay),h=parseInt(bHour)||12;if(!y||!m||!d||m<1||m>12||d<1||d>31||y<1900||y>2100){setNatalErr('Введите корректную дату (год 1900–2100)');return;}setNatalErr('');try{const positions=calcPlanetPositions(y,m,d,h);const nAspects=findNatalAspects(positions,lookup);setNatalData({positions,aspects:nAspects,date:`${d}.${m}.${y}`});}catch(e){setNatalErr('Ошибка расчёта. Проверьте дату.');}}
function openInRef(np1,np2,aIdx){setP1(np1);setP2(np2);setSelAspect(aIdx);setExpanded(aIdx);setVectorOpen({});setActiveTab(1);}

const displayAspects=selAspect!==null?[aspects[selAspect]]:aspects;
const cm=MODES[mode];

const TABS=[{label:'🌟 Карта',hint:'Натальная карта'},{label:'📚 Справка',hint:'Все аспекты'},{label:'🎨 Арт Rx',hint:'Визуальное'},{label:'📖 Литература',hint:'Текст Rx'},{label:'🎵 Звук',hint:'Музыка Rx'}];

return(<div className="min-h-screen bg-gray-950 text-gray-100">
<div className="relative border-b border-purple-900 px-4 py-3 no-print" style={{background:'linear-gradient(135deg,#1e1040,#2d1060,#1e1040)'}}>
<button onClick={()=>window.print()} className="absolute right-3 top-3 z-10 px-2.5 py-1.5 rounded-lg text-xs font-bold border" style={{background:'rgba(124,58,237,0.35)',borderColor:'#7c3aed66',color:'#c4b5fd'}}>🖨️ PDF</button>
<div className="flex justify-center gap-2 mb-1">{['✦','★','✦','★','✦'].map((s,i)=><span key={i} className="star-anim opacity-60 text-sm" style={{animationDelay:`${i*0.4}s`}}>{s}</span>)}</div>
<h1 className="text-center text-xl font-black tracking-widest gold-shimmer">⚡ БИОХИМИЧЕСКИЙ РЕЗОНАНС</h1>
<p className="text-center text-xs font-bold text-purple-300 tracking-widest mt-0.5 uppercase">by Eva White</p>
<p className="text-center text-xs text-purple-500">Астрология · Мозг · Искусство · Литература · Звук</p>
</div>
<div className="flex border-b border-gray-800 bg-gray-900 overflow-x-auto no-print">
{TABS.map(({label,hint},i)=>(<button key={i} onClick={()=>setActiveTab(i)} className={`flex-1 py-2 px-1 text-xs font-semibold transition-all border-b-2 whitespace-nowrap ${activeTab===i?'border-purple-500 text-purple-300 bg-gray-800':'border-transparent text-gray-500'}`}><div>{label}</div><div className="hidden sm:block opacity-50" style={{fontSize:'9px'}}>{hint}</div></button>))}
</div>
<GlobalModeSwitcher mode={mode} setMode={setMode}/>
<div className="max-w-4xl mx-auto px-3 py-4 space-y-4">

{activeTab===0&&(<div className="space-y-4">
<div className="bg-gray-900 rounded-2xl border border-purple-800 overflow-hidden"><div className="px-4 py-3 flex items-center gap-2" style={{background:'linear-gradient(90deg,#1e1040,#2d1060)'}}><span className="text-xl">🌟</span><div><p className="text-sm font-bold text-purple-200">Ваша натальная карта</p><p className="text-xs text-purple-400">Введите дату рождения · Система рассчитает аспекты и биохимический резонанс</p></div></div>
<div className="p-4 space-y-3">
<div className="grid grid-cols-2 gap-3">
<div><label className="text-xs text-gray-400 block mb-1">День</label><input value={bDay} onChange={e=>setBDay(e.target.value)} placeholder="1–31" className="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:border-purple-500 focus:outline-none"/></div>
<div><label className="text-xs text-gray-400 block mb-1">Месяц</label><input value={bMonth} onChange={e=>setBMonth(e.target.value)} placeholder="1–12" className="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:border-purple-500 focus:outline-none"/></div>
<div><label className="text-xs text-gray-400 block mb-1">Год</label><input value={bYear} onChange={e=>setBYear(e.target.value)} placeholder="1900–2100" className="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:border-purple-500 focus:outline-none"/></div>
<div><label className="text-xs text-gray-400 block mb-1">Час (необязательно)</label><input value={bHour} onChange={e=>setBHour(e.target.value)} placeholder="0–23" className="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:border-purple-500 focus:outline-none"/></div>
</div>
{natalErr&&<p className="text-red-400 text-xs bg-red-950 rounded-lg px-3 py-2">{natalErr}</p>}
{autoLoaded&&<p className="text-center text-xs font-bold text-green-400">✅ Дата рождения загружена из памяти</p>}
<button onClick={calcNatal} className="w-full py-3 rounded-xl font-bold text-white text-sm" style={{background:'linear-gradient(90deg,#7c3aed,#a855f7,#7c3aed)'}}>✨ Рассчитать карту</button>
<div className="flex items-center gap-2">
<button onClick={saveBirth} className="flex-1 py-2.5 rounded-xl font-bold text-white text-xs border-2" style={{background:'rgba(5,78,46,0.5)',borderColor:'#059669'}}>💾 Сохранить дату</button>
<button onClick={clearBirth} className="px-4 py-2.5 rounded-xl font-bold text-white text-xs border-2" style={{background:'rgba(127,29,29,0.5)',borderColor:'#dc2626'}}>🗑️ Очистить</button>
{saveConfirm&&<span className="text-xs font-black" style={{color:saveConfirm.includes('🗑️')?'#f87171':'#4ade80'}}>{saveConfirm}</span>}
</div>
<div className="rounded-lg px-3 py-2 border" style={{background:cm.bg,borderColor:cm.color+'44'}}><p className="text-xs font-bold mb-0.5" style={{color:cm.color}}>{cm.icon} Текущий режим: {cm.label}</p><p className="text-xs" style={{color:cm.color+'bb'}}>{cm.desc}</p></div>
</div></div>
{natalData&&(<>
<div className="bg-gray-900 rounded-2xl border border-indigo-800 overflow-hidden"><div className="px-4 py-2 flex items-center justify-between" style={{background:'linear-gradient(90deg,#0f0a2e,#1a0f3a)'}}><div className="flex items-center gap-2"><span>🔭</span><span className="text-xs font-bold text-indigo-200 uppercase">Карта · {natalData.date}</span></div><span className="text-xs text-indigo-400">{natalData.aspects.length} аспектов</span></div><div className="p-3"><NatalWheel positions={natalData.positions} natalAspects={natalData.aspects}/></div></div>
<div className="bg-gray-900 rounded-2xl border border-gray-700 overflow-hidden"><div className="px-4 py-2 bg-gray-800"><p className="text-xs font-bold text-gray-300 uppercase">📍 Положения планет</p></div><div className="p-3 grid grid-cols-2 gap-1.5">{planets.map(p=><div key={p} className="flex items-center gap-2 bg-gray-800 rounded-lg px-2 py-1.5"><span>{pEmoji[p]}</span><div><p className="text-xs font-semibold text-white">{pr(p)}</p><p className="text-xs text-gray-400">{getLonStr(natalData.positions[p])}</p></div></div>)}</div></div>
<div className="bg-gray-900 rounded-2xl border border-gray-700 overflow-hidden"><div className="px-4 py-2 bg-gray-800 flex items-center justify-between"><p className="text-xs font-bold text-gray-300 uppercase">⚡ Биохимические аспекты · {cm.icon} {cm.label}</p><span className="text-xs text-gray-500">{natalData.aspects.length} найдено</span></div><div className="divide-y divide-gray-800">{natalData.aspects.length===0&&<p className="text-center text-gray-600 text-xs py-4">Значимых аспектов не найдено</p>}{natalData.aspects.map((asp,k)=>{const entry=getEntry(asp.p1,asp.p2,asp.aspectIdx);if(!entry)return null;const adDef=ASPECT_DEFS[asp.aspectIdx];return(<div key={k} className="px-3 py-3"><div className="flex items-start justify-between gap-2"><div className="flex items-center gap-2 flex-wrap"><span className={`${adDef.badge} text-white text-sm w-7 h-7 rounded-full flex items-center justify-center font-bold`}>{adDef.sym}</span><div><div className="flex items-center gap-1.5 flex-wrap"><span className="font-bold text-white text-sm">{pEmoji[asp.p1]} {pr(asp.p1)}</span><span className="text-gray-400 text-xs">{adDef.name}</span><span className="font-bold text-white text-sm">{pEmoji[asp.p2]} {pr(asp.p2)}</span><span className="text-xs px-1.5 py-0.5 rounded-full bg-gray-700 text-gray-400">орб {asp.orb}°</span></div><p className="text-xs text-gray-500 mt-0.5">{entry.experience}</p></div></div><button onClick={()=>openInRef(asp.p1,asp.p2,asp.aspectIdx)} className="shrink-0 text-xs px-3 py-1.5 rounded-lg font-bold text-white no-print" style={{background:adDef.color+'cc'}}>🧠 Открыть</button></div></div>);})}
</div></div>
</>)}
</div>)}

{activeTab===1&&(<div className="space-y-4">
<div className="rounded-xl px-4 py-3 border-2" style={{background:cm.bg,borderColor:cm.color}}><p className="text-sm font-black" style={{color:cm.color}}>{cm.icon} Режим {cm.label} активен</p><p className="text-xs mt-0.5" style={{color:cm.color+'cc'}}>{cm.desc}</p></div>
<div className="grid grid-cols-2 gap-3">
{[{label:'Планета 1',val:p1,set:handleP1,other:p2},{label:'Планета 2',val:p2,set:handleP2,other:p1}].map(({label,val,set,other})=>(<div key={label} className="bg-gray-900 rounded-xl p-3 border border-gray-700"><p className="text-xs text-gray-400 mb-2">{label}</p><div className="flex flex-wrap gap-1">{planets.map(p=><button key={p} onClick={()=>set(p)} disabled={p===other} className={`px-2 py-1 rounded-lg text-xs font-medium border transition-all ${p===val?pColorCard[p]+' border-2':p===other?'bg-gray-800 border-gray-700 text-gray-600 cursor-not-allowed':'bg-gray-800 border-gray-600 text-gray-300'}`}>{pEmoji[p]} {pr(p)}</button>)}</div></div>))}
</div>
<div className="grid grid-cols-2 gap-3">{[p1,p2].map(p=><div key={p} className={`rounded-xl p-3 border-2 ${pColorCard[p]}`}><div className="flex items-center gap-2 mb-1"><span className={`w-6 h-6 rounded-full ${pBgBadge[p]} flex items-center justify-center text-white text-xs font-bold`}>{pEmoji[p]}</span><span className="font-bold text-sm">{pr(p)}</span></div><p className="text-xs opacity-80">🧠 {pBrainDisp[p]}</p><p className="text-xs opacity-70 mt-1">⚗️ {pNtDisp[p]}</p></div>)}</div>
<div className="flex flex-wrap gap-2 justify-center no-print">
<button onClick={()=>{setSelAspect(null);setExpanded(null);setVectorOpen({});}} className={`px-3 py-1 rounded-full text-xs font-medium transition-all ${selAspect===null?'bg-white text-gray-900':'bg-gray-800 text-gray-300'}`}>Все аспекты</button>
{aspects.map((a,i)=><button key={a.name} onClick={()=>{setSelAspect(selAspect===i?null:i);setExpanded(null);setVectorOpen({});}} className={`px-3 py-1 rounded-full text-xs font-medium transition-all ${selAspect===i?a.badge+' text-white':'bg-gray-800 text-gray-300'}`}>{a.sym} {a.name} {a.deg}</button>)}
</div>
<div className="space-y-3">{displayAspects.map(asp=>{
const aIdx=aspects.indexOf(asp);const entry=getEntry(p1,p2,aIdx);const isExpanded=expanded===aIdx;if(!entry)return null;
const vd=getVectorData(p1,p2,aIdx);const isVOpen=!!vectorOpen[aIdx];const isTense=aIdx===3||aIdx===4;const ev=getEventData(p1,p2,aIdx);const dynOrb=getDynamicOrb(p1,p2,aIdx).toFixed(1);
return(<div key={asp.name} className={`rounded-xl border border-gray-700 overflow-hidden ${asp.bg}`}>
<button onClick={()=>setExpanded(isExpanded?null:aIdx)} className="w-full text-left px-4 py-3 flex items-center justify-between">
<div className="flex items-center gap-3"><span className={`${asp.badge} text-white text-lg w-9 h-9 rounded-full flex items-center justify-center font-bold shadow`}>{asp.sym}</span>
<div><div className="flex items-center gap-2 flex-wrap"><span className="font-bold text-gray-900 text-sm">{asp.name}</span><span className="text-xs text-gray-500">{asp.deg}</span><span className="text-xs italic text-gray-500">{asp.desc}</span><span className="text-xs bg-gray-200 text-gray-600 px-1.5 py-0.5 rounded-full font-mono">орб ≤{dynOrb}°</span>{isTense&&<span className="text-xs px-2 py-0.5 rounded-full font-bold text-white" style={{background:cm.color}}>{cm.icon} {cm.label}</span>}</div>
<p className="text-xs text-gray-600 mt-0.5">🧠 {entry.regions}</p></div></div>
<span className="text-gray-400 text-lg ml-2">{isExpanded?'▲':'▼'}</span>
</button>
<div className="px-4 pb-3"><p className="text-xs text-gray-700 leading-relaxed">{entry.experience}</p></div>
{isExpanded&&(<div className="px-4 py-3 rounded-b-xl" style={{background:'#09071f',borderTop:'1px solid rgba(109,40,217,0.35)'}}><AspectDetail entry={entry} p1={p1} p2={p2} aIdx={aIdx} mode={mode} vd={vd} vectorOpen={isVOpen} setVectorOpen={(fn)=>setVectorOpen(prev=>({...prev,[aIdx]:typeof fn==='function'?fn(prev[aIdx]):fn}))} ev={ev}/></div>)}
</div>);})}
</div>
<div className="bg-gray-900 rounded-xl p-4 border border-gray-700"><p className="text-xs font-bold text-gray-400 uppercase mb-2">Легенда структур мозга</p><div className="grid grid-cols-1 gap-1 text-xs text-gray-400">{[['СДС','Сеть пассивного режима · центр «я»'],['лПФК / пПФК','лев./прав. дорсолатеральная ПФК'],['ПКК','Передняя поясная кора · мониторинг ошибок'],['ВТА','Вентральная тегментальная область · дофамин'],['Ось ГГН','Гипоталамус-Гипофиз-Надпочечники · стресс'],['РАС','Ретикулярная активирующая система'],['BDNF','Нейротрофический фактор мозга'],['АХ','Ацетилхолин · обучение, внимание, память']].map(([k,v])=><div key={k}><span className="text-gray-300">{k}</span> — {v}</div>)}</div><div className="mt-3 pt-3 border-t border-gray-700"><p className="text-xs font-bold text-purple-400 mb-1">⚡ Динамическая система орбов ZET</p><p className="text-xs text-gray-500">Светила: до 10° · Личные: до 7° · Социальные: до 5° · Транссатурновые: до 4°</p></div></div>
</div>)}

{activeTab===2&&<ArtArticleTab p1={p1} p2={p2} mode={mode}/>}
{activeTab===3&&<LiteraryPharmacy mode={mode} p1={p1} p2={p2}/>}
{activeTab===4&&<SoundPharmacy mode={mode} p1={p1} p2={p2}/>}

</div>
<div className="text-center py-4 border-t border-gray-800 mt-4">
<p className="text-xs text-gray-600">⚡ Биохимический Резонанс</p>
<p className="text-xs font-bold text-purple-500">by Eva White</p>
<p className="text-xs text-gray-700 mt-1">Астрология · Нейронаука · Искусство · Литература · Звук · © 2025</p>
<div className="mt-2 flex items-center justify-center gap-3 no-print"><span className="text-xs text-gray-600 flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full bg-green-500 inline-block"></span>PWA готово</span><span className="text-xs text-gray-600">·</span><span className="text-xs text-gray-600">💾 Данные сохраняются локально</span></div>
</div>
</div>);}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
