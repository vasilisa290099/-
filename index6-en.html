// ═══ BIOCHEMICAL PROFILE MAP (replaces NatalWheel — no zodiac) ═══
function BiochemicalMap({positions,natalAspects}){
  const cx=140,cy=140,R=105;
  const pOrder=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto'];
  function lxy(lon,r){const a=(lon-90)*D2R;return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};}
  return(
    <svg viewBox="0 0 280 280" className="w-full max-w-xs mx-auto">
      <defs>
        <style>{`@keyframes bmap{0%,100%{opacity:1}50%{opacity:0.5}}.bmdot{animation:bmap 3s ease-in-out infinite}`}</style>
        <radialGradient id="bgmap" cx="50%" cy="50%" r="50%"><stop offset="0%" stopColor="#17124a"/><stop offset="100%" stopColor="#07031a"/></radialGradient>
        <filter id="glo2"><feGaussianBlur stdDeviation="3"/></filter>
      </defs>
      <circle cx={cx} cy={cy} r={R+22} fill="url(#bgmap)" stroke="#1e1b4b" strokeWidth="1.5"/>
      <circle cx={cx} cy={cy} r={R} fill="none" stroke="#312e81" strokeWidth="0.8" opacity="0.6" strokeDasharray="2,4"/>
      <circle cx={cx} cy={cy} r={R*0.6} fill="none" stroke="#1e1b4b" strokeWidth="0.5" opacity="0.4"/>
      <circle cx={cx} cy={cy} r={R*0.3} fill="none" stroke="#1e1b4b" strokeWidth="0.5" opacity="0.3"/>
      <line x1={cx-R-8} y1={cy} x2={cx+R+8} y2={cy} stroke="#4f46e5" strokeWidth="0.4" opacity="0.2"/>
      <line x1={cx} y1={cy-R-8} x2={cx} y2={cy+R+8} stroke="#4f46e5" strokeWidth="0.4" opacity="0.2"/>
      <circle cx={cx} cy={cy} r={14} fill="#131036" stroke="#4f46e5" strokeWidth="1.5"/>
      <text x={cx} y={cy+5} textAnchor="middle" fontSize="12" fill="#818cf8" fontWeight="900">⚡</text>
      {natalAspects.map((asp,k)=>{const xy1=lxy(positions[asp.p1],R*0.72),xy2=lxy(positions[asp.p2],R*0.72);return<line key={k} x1={xy1.x} y1={xy1.y} x2={xy2.x} y2={xy2.y} stroke={asp.ad.color} strokeWidth="0.9" opacity="0.5" strokeDasharray={asp.aspectIdx===3||asp.aspectIdx===4?"none":"3,2"}/>;})
      }
      {pOrder.map(p=>{const lon=positions[p];const{x,y}=lxy(lon,R*0.72);const cl=PLANET_CLR[p]||'#fff';const label=pShortEN(p);const labelR=R*0.92;const lp=lxy(lon,labelR);const lx=Math.max(16,Math.min(264,lp.x));const ly=Math.max(10,Math.min(270,lp.y+(y<cy-10?-4:9)));
        return(<g key={p}>
          <circle cx={x} cy={y} r={9} fill={cl} filter="url(#glo2)" opacity="0.35"/>
          <circle cx={x} cy={y} r={7} fill={cl} fillOpacity="0.2" stroke={cl} strokeWidth="1.5" className="bmdot"/>
          <circle cx={x} cy={y} r={3.5} fill={cl}/>
          <text x={lx} y={ly} textAnchor="middle" fontSize="5.8" fill={cl} fontWeight="800" fontFamily="system-ui,sans-serif">{label}</text>
        </g>);})}
    </svg>
  );
}

        const w=TRANSIT_PLANET_WEIGHTS[tP]*TRANSIT_ASPECT_MULT[best.idx]*exact;
        res.push({tP,nP,ad:best,orbVal:bestDev.toFixed(1),exact,weight:w});
      }
    }
  }
  return res.sort((a,b)=>b.weight-a.weight);
}

function calcPlanetActivation(transitAspects,natalAspects){
  const pList=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto'];
  const result={};
  pList.forEach(planet=>{
    const nSens=(natalAspects||[])
      .filter(a=>a.p1===planet||a.p2===planet)
      .reduce((s,a)=>s+(a.aspectIdx===3||a.aspectIdx===4?2.5:0.8),0);
    const tAspects=transitAspects.filter(a=>a.nP===planet);
    const tAct=tAspects.reduce((s,a)=>s+a.weight*3,0);
    const total=nSens*(1+tAct*0.3)+tAct;
    result[planet]={
      base:nSens,transit:tAct,total,
      level:total>8?'HIGH':total>3.5?'MEDIUM':'LOW',
      topTransit:tAspects[0]||null
    };
  });
  return result;
}

function getMoonPhase(date){
  const known=new Date(2000,0,6.3);
  const diff=(date-known)/(1000*60*60*24);
  const cycle=29.530589;
  const phase=((diff%cycle)+cycle)%cycle;
  if(phase<1.85)return{name:'New Moon',icon:'🌑',energy:'Stillness · New intentions · Minimum stimulation',protocol:'DMN protocols · Rest · No new inputs'};
  if(phase<7.38)return{name:'Waxing Crescent',icon:'🌒',energy:'Gentle activation · Begin what you planted',protocol:'ACh protocols · Planning · Light expansion'};
  if(phase<9.22)return{name:'First Quarter',icon:'🌓',energy:'Action time · Decision point',protocol:'Impulse protocols · Decisive action · Physical load'};
  if(phase<14.77)return{name:'Waxing Gibbous',icon:'🌔',energy:'Build and refine · Peak productivity',protocol:'GABA protocols · Structure · Deep work'};
  if(phase<16.61)return{name:'Full Moon',icon:'🌕',energy:'Peak emotional intensity · EMO-Receiver protocols MAX',protocol:'5HT protocols MAX · Emotional release · Chekhov · Debussy'};
  if(phase<22.15)return{name:'Waning Gibbous',icon:'🌖',energy:'Integration · Gratitude · Harvest wisdom',protocol:'D2 protocols · Reflection · Meaning-making'};
  if(phase<23.99)return{name:'Last Quarter',icon:'🌗',energy:'Release · Let go of what doesn\'t serve',protocol:'HPA protocols · Shadow work · Completion'};
  return{name:'Waning Crescent',icon:'🌘',energy:'Deep rest · Restoration · Prepare for the new',protocol:'DMN protocols · Silence · Minimal schedule'};
}

function handleP2(p){if(p!==p1){setP2(p);setExpanded(null);setVectorOpen({});}}
function calcNatal(){const y=parseInt(bYear),m=parseInt(bMonth),d=parseInt(bDay),h=parseInt(bHour)||12;if(!y||!m||!d||m<1||m>12||d<1||d>31||y<1900||y>2100){setNatalErr('Enter a valid date (year 1900–2100)');return;}setNatalErr('');try{const positions=calcPlanetPositions(y,m,d,h);const nAspects=findNatalAspects(positions,lookup);setNatalData({positions,aspects:nAspects,date:`${d}.${m}.${y}`});}catch(e){setNatalErr('Calculation error. Please check the date.');}}
function openInRef(np1,np2,aIdx){setP1(np1);setP2(np2);setSelAspect(aIdx);setExpanded(aIdx);setVectorOpen({});setActiveTab(1);}

const displayAspects=selAspect!==null?[aspects[selAspect]]:aspects;
const cm=MODES[mode];

const TABS=[
  {label:'🧬 Profile',hint:'Biochemical'},
  {label:'📚 Reference',hint:'All interactions'},
  {label:'🎨 Art Rx',hint:'Visual'},
  {label:'📖 Literary',hint:'Text Rx'},
  {label:'🎵 Sound',hint:'Music Rx'},
  {label:'🌍 Transits',hint:'Today'}
];

return(
<div className="min-h-screen bg-gray-950 text-gray-100">
<div className="relative border-b border-purple-900 px-4 py-3 no-print" style={{background:'linear-gradient(135deg,#1e1040,#2d1060,#1e1040)'}}>
<button onClick={()=>window.print()} className="absolute right-3 top-3 z-10 px-2.5 py-1.5 rounded-lg text-xs font-bold border" style={{background:'rgba(124,58,237,0.35)',borderColor:'#7c3aed66',color:'#c4b5fd'}}>🖨️ PDF</button>
<div className="flex justify-center gap-2 mb-1">{['✦','★','✦','★','✦'].map((s,i)=><span key={i} className="star-anim opacity-60 text-sm" style={{animationDelay:`${i*0.4}s`}}>{s}</span>)}</div>
<h1 className="text-center text-xl font-black tracking-widest gold-shimmer">⚡ BIOCHEMICAL RESONANCE</h1>
<p className="text-center text-xs font-bold text-purple-300 tracking-widest mt-0.5 uppercase">by Eva White</p>
<p className="text-center text-xs text-purple-500">Neurobiology · Brain · Art · Literature · Sound</p>
</div>

{showInstallBanner&&(
<div className="no-print px-3 py-2.5 flex items-center justify-between" style={{background:'linear-gradient(90deg,#1e0a3c,#2d1060,#1e0a3c)',borderBottom:'1px solid #7c3aed44'}}>
<div className="flex items-center gap-2.5"><span className="text-xl">📱</span><div><p className="text-xs font-black text-purple-100">Install App · Home Screen</p><p className="text-xs text-purple-400">Works offline · No internet needed</p></div></div>
<div className="flex items-center gap-2"><button onClick={installApp} className="px-3 py-1.5 rounded-lg text-xs font-black text-white" style={{background:'linear-gradient(90deg,#7c3aed,#a855f7)'}}>Install ↓</button><button onClick={()=>setShowInstallBanner(false)} className="px-2 py-1.5 rounded-lg text-xs text-gray-500">✕</button></div>
</div>
)}

<div className="flex border-b border-gray-800 bg-gray-900 overflow-x-auto no-print">
{TABS.map(({label,hint},i)=>(
<button key={i} onClick={()=>setActiveTab(i)} className={`flex-1 py-2 px-1 text-xs font-semibold transition-all border-b-2 whitespace-nowrap min-w-0 ${activeTab===i?'border-purple-500 text-purple-300 bg-gray-800':'border-transparent text-gray-500'}`}>
<div>{label}</div><div className="font-normal opacity-50 hidden sm:block" style={{fontSize:'9px'}}>{hint}</div>
</button>
))}
</div>

<GlobalModeSwitcher mode={mode} setMode={setMode}/>

<div className="max-w-4xl mx-auto px-3 py-4 space-y-4">

{activeTab===0&&(
<div className="space-y-4">
<div className="bg-gray-900 rounded-2xl border border-purple-800 overflow-hidden">
<div className="px-4 py-3 flex items-center gap-2" style={{background:'linear-gradient(90deg,#1e1040,#2d1060)'}}><span className="text-xl">🧬</span><div><p className="text-sm font-bold text-purple-200">Your Biochemical Profile</p><p className="text-xs text-purple-400">Enter birth date · System calculates biochemical interactions</p></div></div>
<div className="p-4 space-y-3">
<div className="grid grid-cols-2 gap-3">
<div><label className="text-xs text-gray-400 block mb-1">Day</label><input value={bDay} onChange={e=>setBDay(e.target.value)} placeholder="1–31" className="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:border-purple-500 focus:outline-none"/></div>
<div><label className="text-xs text-gray-400 block mb-1">Month</label><input value={bMonth} onChange={e=>setBMonth(e.target.value)} placeholder="1–12" className="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:border-purple-500 focus:outline-none"/></div>
<div><label className="text-xs text-gray-400 block mb-1">Year</label><input value={bYear} onChange={e=>setBYear(e.target.value)} placeholder="1900–2100" className="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:border-purple-500 focus:outline-none"/></div>
<div><label className="text-xs text-gray-400 block mb-1">Hour (optional)</label><input value={bHour} onChange={e=>setBHour(e.target.value)} placeholder="0–23" className="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:border-purple-500 focus:outline-none"/></div>
</div>
{natalErr&&<p className="text-red-400 text-xs bg-red-950 rounded-lg px-3 py-2">{natalErr}</p>}
{autoLoaded&&<p className="text-center text-xs font-bold text-green-400">✅ Birth date loaded from memory</p>}
<button onClick={calcNatal} className="w-full py-3 rounded-xl font-bold text-white text-sm" style={{background:'linear-gradient(90deg,#7c3aed,#a855f7,#7c3aed)'}}>✨ Calculate Biochemical Profile</button>
<div className="flex items-center gap-2">
<button onClick={saveBirth} className="flex-1 py-2.5 rounded-xl font-bold text-white text-xs border-2" style={{background:'rgba(5,78,46,0.5)',borderColor:'#059669'}}>💾 Save Birth Date</button>
<button onClick={clearBirth} className="px-4 py-2.5 rounded-xl font-bold text-white text-xs border-2" style={{background:'rgba(127,29,29,0.5)',borderColor:'#dc2626'}}>🗑️ Clear</button>
{saveConfirm&&<span className="text-xs font-black whitespace-nowrap" style={{color:saveConfirm.includes('🗑️')?'#f87171':'#4ade80'}}>{saveConfirm}</span>}
</div>
<div className="rounded-lg px-3 py-2 border" style={{background:cm.bg,borderColor:cm.color+'44'}}><p className="text-xs font-bold mb-0.5" style={{color:cm.color}}>{cm.icon} Current Mode: {cm.label}</p><p className="text-xs" style={{color:cm.color+'bb'}}>{cm.desc}</p></div>
{natalData&&<div className="rounded-lg px-3 py-2 border border-purple-700" style={{background:'rgba(124,58,237,0.15)'}}><p className="text-xs font-bold text-purple-300">🌍 Transit tab is now active! Switch to <span className="text-white">🌍 Transits</span> tab to see your personal protocol for today.</p></div>}
</div>
</div>
{natalData&&(<>
<div className="bg-gray-900 rounded-2xl border border-indigo-800 overflow-hidden">
<div className="px-4 py-2 flex items-center justify-between" style={{background:'linear-gradient(90deg,#0f0a2e,#1a0f3a)'}}><div className="flex items-center gap-2"><span>🧬</span><span className="text-xs font-bold text-indigo-200 uppercase">Biochemical Profile · {natalData.date}</span></div><span className="text-xs text-indigo-400">{natalData.aspects.length} interactions</span></div>
<div className="p-3"><BiochemicalMap positions={natalData.positions} natalAspects={natalData.aspects}/></div>
</div>
<div className="bg-gray-900 rounded-2xl border border-gray-700 overflow-hidden">
<div className="px-4 py-2 bg-gray-800"><p className="text-xs font-bold text-gray-300 uppercase">📍 Neuromodule Coordinates</p></div>
<div className="p-3 grid grid-cols-2 gap-1.5">{planets.map(p=><div key={p} className="flex items-center gap-2 bg-gray-800 rounded-lg px-2 py-1.5"><span className="text-sm">{pEmoji[p]}</span><div><p className="text-xs font-semibold text-white truncate">{pShortEN(p)}</p><p className="text-xs text-gray-400">{getLonStr(natalData.positions[p])}</p></div></div>)}</div>
</div>
<div className="bg-gray-900 rounded-2xl border border-gray-700 overflow-hidden">
<div className="px-4 py-2 bg-gray-800 flex items-center justify-between"><p className="text-xs font-bold text-gray-300 uppercase">⚡ Biochemical Interactions · {cm.icon} {cm.label}</p><span className="text-xs text-gray-500">{natalData.aspects.length} found</span></div>
<div className="divide-y divide-gray-800">
{natalData.aspects.length===0&&<p className="text-center text-gray-600 text-xs py-4">No significant interactions found</p>}
{natalData.aspects.map((asp,k)=>{const entry=getEntry(asp.p1,asp.p2,asp.aspectIdx);if(!entry)return null;const adDef=ASPECT_DEFS[asp.aspectIdx];return(<div key={k} className="px-3 py-3"><div className="flex items-start justify-between gap-2"><div className="flex items-center gap-2 flex-wrap"><span className={`${adDef.badge} text-white text-sm w-7 h-7 rounded-full flex items-center justify-center font-bold`}>{adDef.sym}</span><div><div className="flex items-center gap-1.5 flex-wrap"><span className="font-bold text-white text-sm">{pEmoji[asp.p1]} {pShortEN(asp.p1)}</span><span className="text-gray-400 text-xs">{adDef.name}</span><span className="font-bold text-white text-sm">{pEmoji[asp.p2]} {pShortEN(asp.p2)}</span></div><p className="text-xs text-gray-500 mt-0.5">{entry.experience}</p></div></div><button onClick={()=>openInRef(asp.p1,asp.p2,asp.aspectIdx)} className="shrink-0 text-xs px-3 py-1.5 rounded-lg font-bold text-white no-print" style={{background:adDef.color+'cc'}}>🧠 Open</button></div></div>);})}
</div>
</div>
</>)}
</div>
)}

{activeTab===1&&(
<div className="space-y-4">
<div className="rounded-xl px-4 py-3 border-2" style={{background:cm.bg,borderColor:cm.color}}><p className="text-sm font-black" style={{color:cm.color}}>{cm.icon} {cm.label} Mode Active</p><p className="text-xs mt-0.5" style={{color:cm.color+'cc'}}>{cm.desc}</p></div>
<div className="grid grid-cols-2 gap-3">
{[{label:'Neuromodule 1',val:p1,set:handleP1,other:p2},{label:'Neuromodule 2',val:p2,set:handleP2,other:p1}].map(({label,val,set,other})=>(
<div key={label} className="bg-gray-900 rounded-xl p-3 border border-gray-700"><p className="text-xs text-gray-400 mb-2">{label}</p><div className="flex flex-wrap gap-1">{planets.map(p=><button key={p} onClick={()=>set(p)} disabled={p===other} className={`px-2 py-1 rounded-lg text-xs font-medium border transition-all ${p===val?pColorCard[p]+' border-2':p===other?'bg-gray-800 border-gray-700 text-gray-600 cursor-not-allowed':'bg-gray-800 border-gray-600 text-gray-300'}`}>{pEmoji[p]} {pShortEN(p)}</button>)}</div></div>))}
</div>
<div className="grid grid-cols-2 gap-3">{[p1,p2].map(p=><div key={p} className={`rounded-xl p-3 border-2 ${pColorCard[p]}`}><div className="flex items-center gap-2 mb-1"><span className={`w-6 h-6 rounded-full ${pBgBadge[p]} flex items-center justify-center text-white text-xs font-bold`}>{pEmoji[p]}</span><span className="font-bold text-sm">{pen(p)}</span></div><p className="text-xs opacity-80">🧠 {pBrain[p]}</p><p className="text-xs opacity-70 mt-1">⚗️ {pNt[p]}</p></div>)}</div>
<div className="flex flex-wrap gap-2 justify-center no-print">
<button onClick={()=>{setSelAspect(null);setExpanded(null);setVectorOpen({});}} className={`px-3 py-1 rounded-full text-xs font-medium transition-all ${selAspect===null?'bg-white text-gray-900':'bg-gray-800 text-gray-300'}`}>All types</button>
{aspects.map((a,i)=><button key={a.name} onClick={()=>{setSelAspect(selAspect===i?null:i);setExpanded(null);setVectorOpen({});}} className={`px-3 py-1 rounded-full text-xs font-medium transition-all ${selAspect===i?a.badge+' text-white':'bg-gray-800 text-gray-300'}`}>{a.sym} {a.name}</button>)}
</div>
<div className="space-y-3">
{displayAspects.map(asp=>{
const aIdx=aspects.indexOf(asp);const entry=getEntry(p1,p2,aIdx);const isExpanded=expanded===aIdx;if(!entry)return null;
const vd=getVectorData(p1,p2,aIdx);const isVOpen=!!vectorOpen[aIdx];const ev=getEventData(p1,p2,aIdx);
return(
<div key={asp.name} className={`rounded-xl border border-gray-700 overflow-hidden ${asp.bg}`}>
<button onClick={()=>setExpanded(isExpanded?null:aIdx)} className="w-full text-left px-4 py-3 flex items-center justify-between">
<div className="flex items-center gap-3"><span className={`${asp.badge} text-white text-lg w-9 h-9 rounded-full flex items-center justify-center font-bold shadow`}>{asp.sym}</span>
<div><div className="flex items-center gap-2 flex-wrap"><span className="font-bold text-gray-900 text-sm">{asp.name}</span><span className="text-xs italic text-gray-500">{asp.desc}</span></div>
<p className="text-xs text-gray-600 mt-0.5">🧠 {entry.regions}</p></div></div>
<span className="text-gray-400 text-lg ml-2">{isExpanded?'▲':'▼'}</span>
</button>
<div className="px-4 pb-3"><p className="text-xs text-gray-700 leading-relaxed">{entry.experience}</p></div>
{isExpanded&&(<div className="px-4 py-3 rounded-b-xl" style={{background:'#09071f',borderTop:'1px solid rgba(109,40,217,0.35)'}}><AspectDetail entry={entry} p1={p1} p2={p2} aIdx={aIdx} mode={mode} vd={vd} vectorOpen={isVOpen} setVectorOpen={(fn)=>setVectorOpen(prev=>({...prev,[aIdx]:typeof fn==='function'?fn(prev[aIdx]):fn}))} ev={ev}/></div>)}
</div>);})}
</div>
<div className="bg-gray-900 rounded-xl p-4 border border-gray-700"><p className="text-xs font-bold text-gray-400 uppercase mb-2">Brain Structure Legend</p><div className="grid grid-cols-1 gap-1 text-xs text-gray-400">{[['DMN','Default Mode Network · center of "self"'],['lPFC / rPFC','left/right dorsolateral Prefrontal Cortex'],['ACC','Anterior Cingulate Cortex · error monitoring'],['VTA','Ventral Tegmental Area · dopamine source'],['HPA Axis','Hypothalamus-Pituitary-Adrenal · stress response'],['RAS','Reticular Activating System'],['BDNF','Brain-Derived Neurotrophic Factor'],['ACh','Acetylcholine · learning, attention, memory']].map(([k,v])=><div key={k}><span className="text-gray-300">{k}</span> — {v}</div>)}</div><div className="mt-3 pt-3 border-t border-gray-700"><p className="text-xs font-bold text-purple-400 mb-1">⚡ Biochemical Interaction Types</p><p className="text-xs text-gray-500">Resonance · Cooperation · Open Channel · Interference · Polarization</p><p className="text-xs text-gray-600 mt-1">All analytics based on neurochemical dynamics of neuromodulator systems</p></div></div>
</div>
)}

{activeTab===2&&<ArtArticleTab p1={p1} p2={p2} mode={mode}/>}
{activeTab===3&&<LiteraryPharmacy mode={mode} p1={p1} p2={p2}/>}
{activeTab===4&&<SoundPharmacy mode={mode} p1={p1} p2={p2}/>}
{activeTab===5&&<TransitTab natalData={natalData} mode={mode}/>}

</div>

<div className="text-center py-4 border-t border-gray-800 mt-4">
<p className="text-xs text-gray-600">⚡ Biochemical Resonance</p>
<p className="text-xs font-bold text-purple-500">by Eva White</p>
<p className="text-xs text-gray-700 mt-1">Neurobiology · Neuroscience · Art · Literature · Sound · © 2025</p>
<div className="mt-2 flex items-center justify-center gap-3 no-print"><span className="text-xs text-gray-600 flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full bg-green-500 inline-block"/>PWA Ready</span><span className="text-xs text-gray-600">·</span><span className="text-xs text-gray-600">💾 Data saved locally</span><span className="text-xs text-gray-600">·</span><span className="text-xs text-gray-600">🌍 Transits: daily auto-update</span></div>
</div>
</div>
);}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
