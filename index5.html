  else if(axisPosition<30)posLabel='склонность к растворению';
  else if(axisPosition<45)posLabel='ближе к растворению';

  else if(axisPosition<85)posLabel='склонность к чёткости';

  else{if(dS>sS){pv='in';dc=hasMN?'Moon':(hasVN?'Venus':'Moon');}else if(sS>dS){pv='out';dc=hasVU?'Venus':(hasMU?'Moon':'generic');}else{pv='balanced';dc=hasMN?'Moon':(hasMU?'Moon':'generic');}}
  return{active:true,total:+total.toFixed(2),dS:+dS.toFixed(2),sS:+sS.toFixed(2),dp,pv,dc,isDouble,axisPosition,posLabel,hasMN,hasVN,hasMU,hasVU};
}

function doCalc(pi){
  const data=S.p[pi];
  const d=parseInt(data.date.d),m=parseInt(data.date.m),y=parseInt(data.date.y);
  const errEl=document.getElementById('calc-err-'+pi);
  const btn=document.getElementById('calc-btn-'+pi);
  if(!d||!m||!y||m<1||m>12||d<1||d>31||y<1800||y>2100){
    if(errEl){errEl.style.display='block';errEl.textContent='Введи корректную дату рождения';}
    return;
  }
  if(errEl)errEl.style.display='none';
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span> Анализирую систему...';}
  setTimeout(()=>{
    try{
      const r=calcPlanets(y,m,d);
      const asp=findAspects(r.pos,r.signs);
      const profile=calcProfile(asp,r.signs,r.pos);
      const sections=generateNC(profile);
      const exp={};sections.forEach((_,i)=>{exp[i]=i<2;});
      S.p[pi].profile=profile;S.p[pi].sections=sections;S.p[pi].exp=exp;
      const area=document.getElementById('profile-area-'+pi);
      if(area){
        area.innerHTML=buildProfileArea(pi);
        area.scrollIntoView({behavior:'smooth',block:'start'});
      }
      if(btn){btn.disabled=false;btn.innerHTML='✦ Получить профиль';}
      // Update tab dots
      const tabContent=document.getElementById('tab-content');
      if(tabContent){
        const tabs=document.querySelectorAll('#app button[onclick^="setTab"]');
        // Just re-render header tabs area
        render();
      }
    }catch(e){
      if(btn){btn.disabled=false;btn.innerHTML='✦ Получить профиль';}
      if(errEl){errEl.style.display='block';errEl.textContent='Ошибка: '+e.message;}
    }
  },700);
}

function calcTransit(pi){

    if(aa1&&aa1.active)r+='Мерцающая ось: '+aa1.posLabel+' · вектор '+(aa1.pv==='in'?'внутрь':aa1.pv==='out'?'наружу':aa1.pv==='free'?'∞':aa1.pv)+'\n';
    r+='Нагрузка: петля '+loopP1+'%'+(p1.captured?' · ЗАХВАТ':'')+'\n';
    if(t1)r+='Главная ось: '+(NCN[t1.p1]||t1.p1)+' ↔ '+(NCN[t1.p2]||t1.p2)+'\n';
    r+='\nСИСТЕМА Б\n';r+='Тип: '+s2.name+'\n';r+='Частота: '+s2.freq+'\n';r+='Цепь: '+s2.circuit+'\n';r+='Говорит: '+s2.speaks+'\n';r+='Слышит: '+s2.hears+'\n';r+='Триггер: '+s2.trigger+'\n';r+='Вектор: '+s2.vectorDesc+'\n';
    if(aa2&&aa2.active)r+='Мерцающая ось: '+aa2.posLabel+' · вектор '+(aa2.pv==='in'?'внутрь':aa2.pv==='out'?'наружу':aa2.pv==='free'?'∞':aa2.pv)+'\n';
    r+='Нагрузка: петля '+loopP2+'%'+(p2.captured?' · ЗАХВАТ':'')+'\n';
    if(t2)r+='Главная ось: '+(NCN[t2.p1]||t2.p1)+' ↔ '+(NCN[t2.p2]||t2.p2)+'\n';
    r+='\nАНАЛИЗ ПАРЫ\n';
    if(isSame)r+='⚠ Резонанс: идентичные типы ('+s1.name+'). Взаимное усиление напряжения.\n';
    if(isComplement)r+='✓ Комплементарность векторов — потенциально ресурсная пара.\n';
    r+='\nКЛЮЧЕВОЙ РАЗРЫВ\n';r+='А говорит: «'+s1.speaks+'»\nБ фильтрует через: «'+s2.hears+'»\nТриггер закрытия Б: «'+s2.trigger+'»\n';
    r+='\nПРОТОКОЛ А→Б\n';r+='Говори через «'+s2.hears+'».\n';r+='Не активировать триггер: «'+s2.trigger+'»\n';r+='Подсказка (защита): '+(s2.winHint||'—')+'\n';r+='Подсказка (договор): '+(s2.agreeHint||'—')+'\n';
    r+='\nПРОТОКОЛ Б→А\n';r+='Говори через «'+s1.hears+'».\n';r+='Не активировать триггер: «'+s1.trigger+'»\n';r+='Подсказка (защита): '+(s1.winHint||'—')+'\n';r+='Подсказка (договор): '+(s1.agreeHint||'—')+'\n';
    r+='\n── Eva White · Biochemical Resonance ──';
    S.compat.aiText=r;
  }
  S.compat.aiOpen=!S.compat.aiOpen;
  const tc=document.getElementById('tab-content');
  if(tc)tc.innerHTML='<div style="max-width:540px;margin:0 auto">'+buildCompatibility()+'</div>';
}

render();
</script>
