var TRANSIT_PLANET_WEIGHTS={'Sun':0.4,'Moon':0.7,'Mercury':0.2,'Venus':0.3,'Mars':0.75,'Jupiter':0.55,'Saturn':0.85,'Uranus':0.9,'Neptune':0.85,'Pluto':1.0};
var TRANSIT_ASPECT_MULT={0:1.0,1:0.2,2:0.4,3:0.95,4:0.9};
var TRANSIT_ORB_MAP={'Sun':6,'Moon':8,'Mercury':4,'Venus':4,'Mars':5,'Jupiter':4,'Saturn':3,'Uranus':2,'Neptune':2,'Pluto':2};

function findTransitToNatal(tPos,nPos){
  var res=[];
  var pList=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto'];
  for(var i=0;i<pList.length;i++){
    var tP=pList[i];
    for(var j=0;j<pList.length;j++){
      var nP=pList[j];
      var diff=Math.abs(tPos[tP]-nPos[nP]);
      if(diff>180)diff=360-diff;
      var best=null,bestDev=999;
      for(var k=0;k<ASPECT_DEFS.length;k++){
        var ad=ASPECT_DEFS[k];
        var orb=(TRANSIT_ORB_MAP[tP]+TRANSIT_ORB_MAP[nP])/2;
        var dev=Math.abs(diff-ad.angle);
        if(dev<=orb&&dev<bestDev){bestDev=dev;best={idx:ad.idx,sym:ad.sym,name:ad.name,color:ad.color,badge:ad.badge,usedOrb:orb};}
      }
      if(best){
        var exact=1-(bestDev/best.usedOrb);
        var w=TRANSIT_PLANET_WEIGHTS[tP]*TRANSIT_ASPECT_MULT[best.idx]*exact;
        res.push({tP:tP,nP:nP,ad:best,orbVal:bestDev.toFixed(1),exact:exact,weight:w});
      }
    }
  }
  return res.sort(function(a,b){return b.weight-a.weight;});
}

function calcPlanetActivation(transitAspects,natalAspects){
  var pList=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto'];
  var result={};
  pList.forEach(function(planet){
    var nSens=(natalAspects||[]).filter(function(a){return a.p1===planet||a.p2===planet;}).reduce(function(s,a){return s+(a.aspectIdx===3||a.aspectIdx===4?2.5:0.8);},0);
    var tAspects=transitAspects.filter(function(a){return a.nP===planet;});
    var tAct=tAspects.reduce(function(s,a){return s+a.weight*3;},0);
    var total=nSens*(1+tAct*0.3)+tAct;
    result[planet]={base:nSens,transit:tAct,total:total,level:total>8?'HIGH':total>3.5?'MEDIUM':'LOW',topTransit:tAspects[0]||null};
  });
  return result;
}

function getMoonPhase(date){

  var diff=(date-known)/(1000*60*60*24);
  var cycle=29.530589;

  if(phase<1.85)return{name:'New Moon',icon:'🌑',energy:'Stillness · New intentions · Minimum stimulation',protocol:'Neptune protocols · Rest · No new inputs'};

}

// ── AIReportModal ─────────────────────────────────────────
function AIReportModal({natalData,onClose}){
  const [report,setReport]=useState('');
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [passport,setPassport]=useState('');
  const [showPassport,setShowPassport]=useState(false);
  const isDemo=!OPENAI_API_KEY||OPENAI_API_KEY==='YOUR_OPENAI_API_KEY_HERE';

  useEffect(()=>{if(natalData)setPassport(buildTechPassport(natalData));},[natalData]);

  async function generate(){
    if(!natalData)return;
    setLoading(true);setError('');setReport('');
    if(isDemo){
      await new Promise(r=>setTimeout(r,2200));
      setReport(generateDemoReport(natalData));
      setLoading(false);return;
    }
    try{
      const resp=await fetch(OPENAI_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+OPENAI_API_KEY},body:JSON.stringify({model:OPENAI_MODEL,messages:[{role:'system',content:AI_SYSTEM_PROMPT},{role:'user',content:'Analyze this Individual Neuro-Architecture Profile:\n\n'+passport}],max_tokens:2000,temperature:0.75})});
      const data=await resp.json();
      if(data.error)setError('API Error: '+data.error.message);
      else setReport(data.choices[0].message.content);
    }catch(e){setError('Connection failed. Check your API key and network access.');}
    setLoading(false);
  }

  function renderReport(text){
    if(!text)return null;
    return text.split('\n').map((line,i)=>{
      if(line.startsWith('## '))return<p key={i} className="text-sm font-black text-violet-200 mt-5 mb-2 pb-1.5 border-b border-violet-900 tracking-wide">{line.slice(3)}</p>;
      if(line.startsWith('**⚡')||(line.startsWith('**')&&line.endsWith('**'))){const txt=line.replace(/\*\*/g,'');return<p key={i} className="text-xs font-black text-amber-300 mt-3 mb-1">{txt}</p>;}
      if(line.startsWith('• **')||line.startsWith('**'))return<p key={i} className="text-xs font-bold text-white mt-2 mb-0.5">{line.replace(/\*\*/g,'')}</p>;
      if(line.startsWith('• ')||line.startsWith('- '))return<p key={i} className="text-xs text-gray-300 ml-3 leading-relaxed mt-0.5">◆ {line.slice(2)}</p>;
      if(line.startsWith('---'))return<div key={i} className="border-t border-gray-800 my-3"/>;
      if(line.startsWith('*→'))return<p key={i} className="text-xs text-cyan-400 ml-2 leading-relaxed">{line.replace(/\*/g,'')}</p>;
      if(line.startsWith('*')&&line.endsWith('*'))return<p key={i} className="text-xs text-gray-600 italic mt-1">{line.slice(1,-1)}</p>;
      if(line.trim()==='')return<div key={i} className="h-1.5"/>;
      return<p key={i} className="text-xs text-gray-300 leading-relaxed">{line}</p>;
    });
  }

  return(
    <div className="fixed inset-0 z-50 flex items-start justify-center overflow-y-auto" style={{background:'rgba(0,0,0,0.88)',backdropFilter:'blur(6px)'}}>
    <div className="w-full max-w-2xl mx-3 my-4 rounded-2xl overflow-hidden border border-violet-800 flex flex-col" style={{background:'#0a0618'}}>
      <div className="px-5 py-4 flex items-center justify-between shrink-0" style={{background:'linear-gradient(135deg,#1a0533,#2e1065,#1a0533)'}}>
        <div className="flex items-center gap-3"><div className="w-10 h-10 rounded-xl flex items-center justify-center text-xl" style={{background:'rgba(124,58,237,0.4)'}}>🤖</div><div><p className="text-sm font-black text-violet-100">AI Deep Report</p><p className="text-xs text-violet-400">Neurobiological Architecture Analysis · v7.2 · by Eva White</p></div></div>
        <button onClick={onClose} className="px-3 py-1.5 rounded-lg text-xs font-bold text-gray-400 hover:text-white" style={{background:'rgba(255,255,255,0.05)'}}>✕ Close</button>
      </div>
      <div className="overflow-y-auto p-4 space-y-3" style={{maxHeight:'75vh'}}>
        <div className={'rounded-xl px-4 py-3 border '+(isDemo?'border-amber-800':'border-emerald-800')} style={{background:isDemo?'rgba(120,53,15,0.3)':'rgba(5,78,46,0.3)'}}>
          {isDemo?(<div><p className="text-xs font-black text-amber-400 mb-1">🔑 Demo Mode · API Key Not Configured</p><p className="text-xs text-amber-200 mb-1.5">Simulated report. For live AI analysis, replace OPENAI_API_KEY in the code.</p></div>):(<div className="flex items-center gap-2"><span className="text-emerald-400">✅</span><p className="text-xs font-black text-emerald-400">API Key Configured · Model: {OPENAI_MODEL}</p></div>)}
        </div>
        <div className="rounded-xl overflow-hidden border border-indigo-900">
          <button onClick={()=>setShowPassport(!showPassport)} className="w-full px-4 py-2.5 flex items-center justify-between text-left" style={{background:'rgba(79,46,220,0.15)'}}>
            <div className="flex items-center gap-2"><span>📋</span><span className="text-xs font-bold text-indigo-300">Technical Passport · Neuro-Architecture</span><span className="text-xs text-indigo-600 ml-2">({natalData&&natalData.aspects&&natalData.aspects.length||0} nodes)</span></div>
            <span className="text-xs text-indigo-500">{showPassport?'▲ Collapse':'▼ View Passport'}</span>
          </button>
          {showPassport&&<div className="p-4" style={{background:'#050215'}}><pre className="text-xs text-indigo-300 font-mono whitespace-pre-wrap leading-relaxed" style={{fontSize:'10px'}}>{passport}</pre></div>}
        </div>
        {!report&&!loading&&(<button onClick={generate} className="w-full py-4 rounded-xl font-black text-white text-base" style={{background:'linear-gradient(135deg,#4c1d95,#7c3aed,#a855f7)',boxShadow:'0 4px 30px rgba(124,58,237,0.6)'}}><span className="text-xl">🤖</span><span className="block text-base font-black mt-1">Generate AI Deep Report</span><span className="block text-xs font-normal opacity-75 mt-0.5">{isDemo?'Demo Mode · Simulated Report':'Live Analysis · '+OPENAI_MODEL}</span></button>)}
        {loading&&(<div className="text-center py-10 space-y-4"><div className="text-5xl">🧠</div><p className="text-sm font-bold text-violet-300">Analyzing Neuro-Architecture...</p><div className="flex justify-center gap-1.5 mt-2">{[0,1,2,3,4,5].map(i=>(<div key={i} className="w-2 h-2 rounded-full bg-violet-400" style={{animation:'pulse 1.4s ease-in-out '+(i*0.2)+'s infinite'}}/>))}</div></div>)}
        {error&&(<div className="rounded-xl p-4 border border-red-800" style={{background:'rgba(127,29,29,0.3)'}}><p className="text-xs font-bold text-red-400 mb-2">⚠️ Error</p><p className="text-xs text-red-300 mb-3">{error}</p><button onClick={generate} className="px-4 py-2 rounded-lg text-xs font-bold text-white" style={{background:'rgba(220,38,38,0.5)'}}>↺ Retry</button></div>)}
        {report&&(<div className="space-y-2"><div className="rounded-xl border border-violet-900 p-5" style={{background:'#0d0120'}}><div className="flex items-center gap-2 mb-4 pb-3 border-b border-violet-900"><span className="text-lg">🤖</span><div><p className="text-xs font-black text-violet-200">NEUROBIOLOGICAL DEEP REPORT</p><p className="text-xs text-violet-500">{natalData&&natalData.date} · {isDemo?'Demo Simulation':OPENAI_MODEL+' Analysis'}</p></div></div>{renderReport(report)}</div><button onClick={()=>{setReport('');setError('');}} className="w-full py-2.5 rounded-lg text-xs font-bold text-violet-400 hover:text-white border border-violet-900" style={{background:'rgba(124,58,237,0.1)'}}>🔄 Regenerate Report</button></div>)}
      </div>
    </div>
    </div>
  );
}

            </div>
            <div className="flex flex-wrap gap-2 justify-center no-print">
              <button onClick={()=>{setSelAspect(null);setExpanded(null);setVectorOpen({});}} className={'px-3 py-1 rounded-full text-xs font-medium transition-all '+(selAspect===null?'bg-white text-gray-900':'bg-gray-800 text-gray-300')}>All configurations</button>
              {aspects.map((a,i)=><button key={a.name} onClick={()=>{setSelAspect(selAspect===i?null:i);setExpanded(null);setVectorOpen({});}} className={'px-3 py-1 rounded-full text-xs font-medium transition-all '+(selAspect===i?a.badge+' text-white':'bg-gray-800 text-gray-300')}>{a.sym} {a.name} {a.deg}</button>)}
            </div>
            <div className="space-y-3">
              {displayAspects.map(asp=>{
                const aIdx=aspects.indexOf(asp);
                const entry=getEntry(p1,p2,aIdx);
                const isExpanded=expanded===aIdx;
                if(!entry)return null;
                const vd=getVectorData(p1,p2,aIdx);
                const isVOpen=!!vectorOpen[aIdx];
                const isTense=aIdx===3||aIdx===4;
                const ev=getEventData(p1,p2,aIdx);
                const dynOrb=getDynamicOrb(p1,p2,aIdx).toFixed(1);
                return(
                  <div key={asp.name} className={'rounded-xl border border-gray-700 overflow-hidden '+asp.bg}>
                    <button onClick={()=>setExpanded(isExpanded?null:aIdx)} className="w-full text-left px-4 py-3 flex items-center justify-between">
                      <div className="flex items-center gap-3">
                        <span className={asp.badge+' text-white text-lg w-9 h-9 rounded-full flex items-center justify-center font-bold shadow'}>{asp.sym}</span>
                        <div>
                          <div className="flex items-center gap-2 flex-wrap"><span className="font-bold text-gray-900 text-sm">{asp.name}</span><span className="text-xs text-gray-500">{asp.deg}</span><span className="text-xs italic text-gray-500">{asp.desc}</span><span className="text-xs bg-gray-200 text-gray-600 px-1.5 py-0.5 rounded-full font-mono">orb ≤{dynOrb}°</span>{isTense&&<span className="text-xs px-2 py-0.5 rounded-full font-bold text-white" style={{background:cm.color}}>{cm.icon}</span>}</div>
                          <p className="text-xs text-gray-600 mt-0.5">🔬 {ASPECT_NEURO[aIdx]} · 🧠 {entry.regions}</p>
                        </div>
                      </div>
                      <span className="text-gray-400 text-lg ml-2">{isExpanded?'▲':'▼'}</span>
                    </button>
                    <div className="px-4 pb-3"><p className="text-xs text-gray-700 leading-relaxed">{entry.experience}</p></div>
                    {isExpanded&&(
                      <div className="px-4 py-3 rounded-b-xl" style={{background:'#09071f',borderTop:'1px solid rgba(109,40,217,0.35)'}}>
                        <AspectDetail entry={entry} p1={p1} p2={p2} aIdx={aIdx} mode={mode} vd={vd} vectorOpen={isVOpen} setVectorOpen={fn=>setVectorOpen(prev=>({...prev,[aIdx]:typeof fn==='function'?fn(prev[aIdx]):fn}))} ev={ev}/>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {activeTab===2&&<ArtArticleTab p1={p1} p2={p2} mode={mode}/>}
        {activeTab===3&&<LiteraryPharmacy mode={mode} p1={p1} p2={p2}/>}
        {activeTab===4&&<SoundPharmacy mode={mode} p1={p1} p2={p2}/>}
        {activeTab===5&&<TransitTab natalData={natalData} mode={mode}/>}

      </div>

      <div className="text-center py-4 border-t border-gray-800 mt-4">
        <p className="text-xs text-gray-600">⚡ Biochemical Resonance</p>
        <p className="text-xs font-bold text-purple-500">by Eva White</p>
        <p className="text-xs text-gray-700 mt-1">Individual Neuro-Architecture · Art · Literature · Sound · © 2025</p>
        <div className="mt-2 flex items-center justify-center gap-3 no-print">
          <span className="text-xs text-gray-600 flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full bg-green-500 inline-block"/>PWA Ready</span>
          <span className="text-xs text-gray-600">· 🔬 Dyson Scientific Interface ·</span>
          <span className="text-xs text-gray-600">🤖 AI Report v7.2</span>
        </div>
      </div>

      {showAiModal&&<AIReportModal natalData={natalData} onClose={()=>setShowAiModal(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
