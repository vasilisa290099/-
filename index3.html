function findTransitAspects(transitPos,natalPos){
  const outerPl=['Pluto','Neptune','Uranus','Saturn','Jupiter','Mars'];
  const personalPl=['Sun','Moon','Mercury','Venus','Mars'];
  const results=[];
  for(const tp of outerPl){for(const np of personalPl){
    if(transitPos[tp]==null||natalPos[np]==null)continue;
    let diff=Math.abs(transitPos[tp]-natalPos[np]);if(diff>180)diff=360-diff;
    const maxOrb=tp==='Mars'?2:(tp==='Jupiter'||tp==='Saturn')?4:3;
    for(const ad of ASP_DEF){const dev=Math.abs(diff-ad.a);if(dev<=maxOrb){const key=`${tp}_${np}`;const desc=TRANSIT_NATAL_DESC[key];if(!desc)break;results.push({tp,np,sym:ad.sym,name:ad.name,tense:ad.tense,orb:+dev.toFixed(1),...desc});break;}}
  }}
  return results.sort((a,b)=>Math.abs(b.load)-Math.abs(a.load)).slice(0,6);
}

function detectAffectiveFlickeringAxis(aspects){
  let dissolveScore=0,sharpScore=0;const activeFactors=[];
  aspects.forEach(asp=>{
    const key=conjKey(asp.p1,asp.p2);const pd=AFFECTIVE_AXIS_PAIRS[key];if(!pd)return;
    const genMult=pd.gen?0.35:1.0;const tenseMult=asp.tense?1.2:0.85;const orbFactor=Math.max(0.25,1-asp.orb/12);const w=pd.weight*genMult*tenseMult*orbFactor;
    if(pd.pole==='А')dissolveScore+=w;else if(pd.pole==='Б')sharpScore+=w;else{dissolveScore+=w*0.5;sharpScore+=w*0.5;}
    activeFactors.push({pair:key,p1:asp.p1,p2:asp.p2,aspect:asp.name,sym:asp.sym,orb:asp.orb,weight:+w.toFixed(2),pole:pd.pole,tense:asp.tense,gen:!!pd.gen,label:pd.label});
  });
  const totalScore=dissolveScore+sharpScore;if(totalScore<1.2)return null;
  const dissolveRatio=dissolveScore/(totalScore||1);const polePosition=Math.round((1-dissolveRatio)*100);
  const dominantPole=dissolveRatio>0.62?'А':dissolveRatio<0.38?'Б':'mixed';
  const intensity=Math.min(1.0,totalScore/7);
  const hasMoonNeptune=activeFactors.some(f=>f.pair==='Moon_Neptune'&&!f.gen);
  const hasVenusNeptune=activeFactors.some(f=>f.pair==='Neptune_Venus'&&!f.gen);
  const hasMoonUranus=activeFactors.some(f=>f.pair==='Moon_Uranus'&&!f.gen);
  const hasVenusUranus=activeFactors.some(f=>f.pair==='Uranus_Venus'&&!f.gen);
  const isDoubleCapture=hasMoonUranus&&hasVenusUranus;
  let powerVector='',dominantCarrier='';
  if(isDoubleCapture){powerVector='liberated';dominantCarrier='both';}
  else if(dominantPole==='Б'){powerVector='outward';dominantCarrier=hasVenusUranus?'Venus':(hasMoonUranus?'Moon':'generic');}
  else if(dominantPole==='А'){powerVector='inward';dominantCarrier=hasMoonNeptune?'Moon':(hasVenusNeptune?'Venus':'Moon');}
  else{if(dissolveScore>=sharpScore){powerVector='inward';dominantCarrier=hasMoonNeptune?'Moon':(hasVenusNeptune?'Venus':'Moon');}else{powerVector='outward';dominantCarrier=hasVenusUranus?'Venus':(hasMoonUranus?'Moon':'generic');}}
  return{active:true,score:+totalScore.toFixed(2),intensity,activeFactors:activeFactors.sort((a,b)=>b.weight-a.weight),dissolveScore:+dissolveScore.toFixed(2),sharpScore:+sharpScore.toFixed(2),polePosition,dominantPole,powerVector,dominantCarrier,isDoubleCapture,hasMoonNeptune,hasMoonUranus,hasVenusUranus,hasVenusNeptune};
}

ze:'"Это пройдёт. Давай найдём выход вместе — я вижу путь."',loop:'"Выход из петли — сменить масштаб. Смотрим за горизонт."'},Sun:{conflict:'"Мы договаривались! Ты снова нарушаешь!"',help:'"Мне плохо, а ты не замечаешь!"',silence:'"Почему молчишь?! Это твой ответ?!"',plans:'"Всё надо срочно пересмотреть, так нельзя!"',freeze:'"Ты закрылся/закрылась — я ощущаю это как разрыв."',loop:'"Снова то же самое! Я схожу с ума в этом круге!"'},Moon:{conflict:'"Дело не в хлебе... Что-то изменилось между нами."',help:'"Мне тяжело. Хочу чтобы кто-то просто был рядом."',silence:'"Твоё молчание ощущается как нейрохимический барьер."',plans:'"Мне некомфортно от этих изменений..."',freeze:'"Твоё закрытие — тоже язык. Я слышу. Я здесь."',loop:'"Я снова в этом... Мне нужно чтобы кто-то просто понял меня."'},Mercury:{conflict:'"Есть несоответствие с пунктом X. Нужно уточнить."',help:'"Нужна помощь с конкретным пунктом."',silence:'"Нет ответа на вопрос Y. Каков статус?"',plans:'"Пункты 2 и 3 не работают. Что меняем?"',freeze:'"Нет данных = нет алгоритма. Нужен хоть какой-то сигнал."',loop:'"Паттерн идентифицирован. Нужна новая логика. Ищу выход."'},Venus:{conflict:'"Слушай, был договор... Как нам найти решение?"',help:'"Мне немного плохо. Не хочу обременять, но..."',silence:'"Что-то изменилось? Хочу чтобы баланс восстановился."',plans:'"Что если попробовать иначе?"',freeze:'"Мне важно чтобы всё было хорошо между нами. Ты в порядке?"',loop:'"Может попробуем совсем иначе? Хочу чтобы было лучше для нас."'}};

льно — не симптом а причина? Давай перестроим вместе."'},freeze:{win:'"Что за этим закрытием стоит на самом деле?" Плутон видит защиту — не наказание тебе.',agree:'Не взламывай — покажи что глубина безопасна. HPA оттает только через доверие к честности.'},loop:{win:'"Петля — сигнал что что-то не решено на глубине. Что это на самом деле? Без обёртки."',agree:'"Давай найдём корень, а не симптом. Что реально повторяется — и почему это важно?"'}},Saturn:{conflict:{win:'Факт + нарушенный пункт договора + конкретное следствие. ГАМК-контроллер слышит структуру, не эмоции.',agree:'"Что изменилось в алгоритме? Как восстановить систему?" Сатурн чинит через план.'},help:{win:'"Проблема X. Нужно решение Y." Конкретно и структурно. Сатурн помогает через план, не через тепло.',agree:'"Опиши точно что не работает — вместе найдём системное решение по шагам."'},silence:{win:'"Жду конкретного запроса." Сатурн не читает между строк — ему нужна точная формулировка.',agree:'"Когда будешь готов — жду чёткий запрос. Нет давления, нет дедлайна."'},plans:{win:'"Данные + причина сбоя + новый алгоритм." Без паники. Сатурн работает со структурой.',agree:'"Что именно не работает — конкретно? Строим новую структуру вместе, по шагам."'},freeze:{win:'"Конкретная причина закрытия = конкретное решение. Жду данных без давления."',agree:'"Конкретный план снижает тревогу. Давай составим прямо сейчас — это откроет дверь."'},loop:{win:'"Паттерн выявлен. Меняем одну переменную. Тестируем результат." Сатурн выходит из петли через систему.',agree:'"Что в алгоритме даёт петлю — конкретный пункт? Меняем именно его."'}},Moon:{conflict:{win:'"Дело не в этом. Что-то изменилось между нами." Лимбика слышит безопасность — давай создадим её сначала.',agree:'Сначала нейрохимический контакт — потом содержание. Без этого слова не доходят до лимбики.'},help:{win:'"Мне тяжело. Хочу чтобы кто-то просто был рядом — не решал, а был." Присутствие, не анализ.',agree:'5HT-модулятор нуждается в нейрохимическом присутствии. Не " чный запрос.',agree:'"Опиши точно что происходит — найдём алгоритм выхода по шагам."'},silence:{win:'"Нет ответа на вопрос Y. Каков статус? Жду данных — без этого нет алгоритма."',agree:'"Когда будет информация — напиши. Жду без давления. Мне нужны данные."'},plans:{win:'"Пункты 2-3 не работают. Предлагаю альтернативу: X, Y, Z. Что выбираем?"',agree:'"Вот анализ проблемы + три варианта решения. Обсудим какой лучше?"'},freeze:{win:'"Нет данных = нет алгоритма. Нужен хоть какой-то сигнал — одно слово достаточно."',agree:'"Когда сможешь — опиши что происходит. Один пункт. Найдём выход вместе."'},loop:{win:'"Паттерн идентифицирован. Нужна новая логика — предлагаю конкретный шаг X."',agree:'"Вижу повторяющуюся структуру. Разберём вместе по шагам — где именно петля замыкается?"'}},Uranus:{conflict:{win:'"А зачем это правило существует вообще? Давай создадим лучшее вместо того чтобы чинить сломанное."',agree:'"Что если решение совсем не там где кажется? Давай посмотрим с другой стороны."'},help:{win:'Покажи нестандартный угол или неожиданное решение. Уран помогает через прорыв паттерна, не через поддержку.',agree:'"Что если попробовать совсем иначе — вот нестандартный путь. Интересно?"'},silence:{win:'"Пространство — лучший подарок сейчас. Буду здесь если нужно." Давление закроет сильнее.',agree:'"Когда нужно — я здесь. Не тороплю и не интерпретирую."'},plans:{win:'"Старая система не работает — отличный повод создать лучшую, не чинить сломанную."',agree:'"Это возможность переосмыслить всё с нуля. Давай вместе — мне интересно как ты видишь."'},freeze:{win:'(уйти, дать пространство — давление и объяснения закроют сильнее. Уран оттаивает через свободу)',agree:'"Не удерживаю. Когда вернёшься — поговорим на новом уровне. Дверь открыта."'},loop:{win:'"Петля — потому что старый паттерн. Ломаем структуру целиком, не чиним детали."',agree:'"Что если полностью сменить подход — с нуля, другой принцип? Давай вместе придумаем."'}},Neptune:{conflict:{win:'"Что-то изменилось в нашем общем пространстве..." DMN слышит контекст и смысл, не факты.',agree:'"Давай найдём смысл в этом — не виновного. Что это говорит нам о нас?"'},help:{win:'"Мне тяжело — и я не могу это структурировать. Просто рядом, без слов." DMN чувствует фон.',agree:'Фоновый нейрохимический контакт важнее слов и решений. Просто присутствие в пространстве.'},silence:{win:'(присутствие без давления и без слов — DMN чувствует качество фона, не содержание)',agree:'"Я здесь — просто рядом. Не ухожу и не требую."'},plans:{win:'"Где-то есть смысл в этом хаосе — давай найдём его прежде чем действовать."',agree:'"Что если этот хаос ведёт к чему-то лучшему чем было? Давай поищем вместе."'},freeze:{win:'"Что-то изменилось в нашем фоне. Ты здесь?" Тихо, без давления, только контакт.',agree:'"Чувствую тебя — не тороплю. Просто рядом в этом пространстве."'},loop:{win:'"Это чувство уже было... Откуда оно идёт на самом деле — что за ним стоит?"',agree:'"Давай поищем что этот круг пытается сказать нам. Не бороться с ним — понять его."'}},Jupiter:{conflict:{win:'"Если решим это — оба освободимся для большего. Вот конкретно как." D2 открывается через возможности.',agree:'"Это ведёт к лучшей конфигурации — я вижу как. Давай найдём путь вместе."'},help:{win:'"Это временный этап — я вижу путь вперёд. Давай пройдём его." D2 открывается через горизонт.',agree:'"Я вижу выход — и он лучше чем вход. Давай пройдём это вместе."'},silence:{win:'"Может это сигнал что нужна совсем новая архитектура — лучше старой?"',agree:'"Ничего страшного. Когда готов — вместе найдём что-то лучшее, чем было."'},plans:{win:'"Давайте сделаем это масштабно и правильно — это шанс, не проблема."',agree:'"Это возможность перестроить лучше чем было. Вместе — интереснее и мощнее."'},freeze:{win:'"Это пройдёт. Я вижу путь вперёд — и он хороший." Юпитер оттаивает через горизонт возможностей.',agree:'"Когда будешь готов — покажу путь. Он есть, и он лучше текущего."'},loop:{win:'"Выход из петли — сменить масштаб. Смотрим не на петлю — а за горизонт."',agree:'"Это временно и это пройдёт. Давай найдём что-то большее вместе — выход через рост."'}},Venus:{conflict:{win:'"Был договор — хочу чтобы между нами было хорошо. Как найдём решение?"',agree:'"Мне важна гармония между нами — это ценнее правоты. Найдём решение вместе?"'},help:{win:'"Мне немного плохо. Не хочу обременять — но нужна поддержка. Просто рядом."',agree:'"Было бы хорошо если бы ты был/была рядом. Не для решения — просто рядом."'},silence:{win:'"Что-то изменилось? Мне важно чтобы между нами всё было хорошо — правда."',agree:'"Хочу чтобы баланс восстановился. Я здесь — когда будешь готов."'},plans:{win:'"Что если попробовать иначе — вместе найдём то что лучше для нас обоих?"',agree:'"Давай найдём решение которое хорошо для нас обоих. Мне важно чтобы нам обоим было хорошо."'},freeze:{win:'"Мне важно чтобы всё было хорошо между нами. Ты в порядке? Я здесь."',agree:'"Не давлю. Просто хочу чтобы было хорошо — для нас обоих. Когда готов — я здесь."'},loop:{win:'"Может попробуем совсем иначе? Хочу чтобы стало лучше для нас — искренне."',agree:'"Давай найдём то что хорошо для нас обоих — по-новому, не по старому паттерну."'}}};

function getDominantaDesc(primary){const descs={Mars:'моторный очаг (PAG) — система в режиме немедленного действия',Pluto:'контрольный очаг (Амигдала/HPA) — система сканирует угрозу',Saturn:'тормозной очаг (ГАМК/dlPFC) — система требует структуры',Moon:'лимбический очаг (Гиппокамп) — система в режиме безопасности',Sun:'идентификационный очаг (Таламус) — система требует признания',Mercury:'вербальный очаг (Брока) — система требует ответа',Uranus:'гамма-очаг — система в режиме выхода из паттерна',Neptune:'диффузный очаг (DMN) — система растворяет фокус',Jupiter:'экспансивный очаг (mPFC) — система в режиме роста',Venus:'аттрактивный очаг (NA) — система требует связи'};return descs[primary]||'доминирующий очаг активен';}

          {profile.constitutional?.length>0&&(<div className="rounded-lg overflow-hidden" style={{border:'1px solid rgba(99,102,241,0.25)',background:'rgba(99,102,241,0.05)'}}><div className="px-2 py-1.5 flex items-center gap-1.5" style={{borderBottom:'1px solid rgba(255,255,255,0.05)'}}><Zap size={10} className="text-indigo-400"/><span className="font-black uppercase tracking-wider text-indigo-400" style={{fontSize:'9px'}}>Слой 3 · Конституциональный</span></div><div className="px-2 py-1.5 space-y-1">{profile.constitutional.map((c,i)=>{const bp=BASE[c.planet];const elC={Fire:'#ef4444',Earth:'#94a3b8',Air:'#22d3ee',Water:'#3b82f6'}[c.element]||'#6b7280';return(<div key={i} className="rounded px-2 py-1" style={{background:`${elC}10`,border:`1px solid ${elC}25`}}><div className="flex items-center gap-1 mb-0.5"><span style={{fontSize:'11px'}}>{bp?.em||'?'}</span><span className="font-bold text-white" style={{fontSize:'10px'}}>{c.planet} в {c.signRu}</span>{c.isJupiter&&<span style={{fontSize:'7px',color:'#fdba74',background:'rgba(253,186,116,0.15)',padding:'1px 4px',borderRadius:2}}>фильтр</span>}</div><p style={{fontSize:'9px',color:'#9ca3af'}}>{c.desc}</p></div>);})}</div></div>)}
        </div>)}

  );
}

function detectResonance(meP,themP){const ms=getSubProfile(meP),ts=getSubProfile(themP);if(ms.primary!==ts.primary)return null;const PERS=['Mercury','Venus','Moon','Mars','Sun'];const mp=meP.ranked.filter(r=>PERS.includes(r.planet));const tp=themP.ranked.filter(r=>PERS.includes(r.planet));if(mp[0]?.planet!==tp[0]?.planet)return{type:'differentPersonal',msg:`Оба — ${ms.fullName}. Разные операторы: ${BASE[mp[0]?.planet]?.name||'?'} vs ${BASE[tp[0]?.planet]?.name||'?'}`};if(ms.freq===ts.freq)return{type:'resonance',alert:true,msg:`Идентичные нейронные схемы: ${ms.freq}. Два одинаковых контура — взаимное усиление.`};return{type:'sameBase',msg:`Одна основа (${ms.fullName}), разные частоты: «${ms.freq}» vs «${ts.freq}»`};}

function makeTranslation(sp,lp,sit,goal,resonance){
  if(resonance?.type==='resonance')return{sitHint:`Резонанс напряжения: ${resonance.msg}`,genHint:'Прямое общение усилит конфликт.',extra:'Рекомендуется: дистанция → разрядка → письменный канал.'};
  const sitHint=SIT_HINTS[lp.primary]?.[sit]?.[goal]||'';const genHint=goal==='win'?lp.winHint:lp.agreeHint;
  return{sitHint,genHint,extra:`Их канал: «${lp.hears}» · Триггер: «${lp.trigger}»`};
}

function DateInput({label,em,val,onChange}){return(<div className="rounded-xl border border-gray-700 bg-gray-900 p-3"><p className="text-xs font-bold text-gray-400 mb-2">{em} {label}</p><div className="grid grid-cols-3 gap-2">{[['День','day','1–31'],['Месяц','month','1–12'],['Год','year','1988']].map(([lb,f,ph])=>(<div key={f}><p className="text-xs text-gray-600 mb-1">{lb}</p><input type="number" placeholder={ph} value={val[f]||''} onChange={e=>onChange({...val,[f]:e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-2 py-2 text-white text-sm text-center focus:border-purple-500 focus:outline-none"/></div>))}</div></div>);}

function NeuroTranslatorV72(){

  const meSub=useMemo(()=>{try{return meP?getSubProfile(meP):null;}catch(e){return null;}},[meP]);

                      const aa=p?.affectiveAxis;if(!aa?.active)return(<div key={l} className="rounded px-2 py-1.5" style={{background:'rgba(0,0,0,0.3)'}}><p style={{fontSize:'8px',color:'#4b5563'}}>{l}: ось не активна</p></div>);
