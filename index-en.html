const D2R = Math.PI/180, R2D = 180/Math.PI;
function _n360(x){return((x%360)+360)%360;}
function _jd(Y,M,D,h=12){if(M<=2){Y--;M+=12;}const A=Math.floor(Y/100),B=2-A+Math.floor(A/4);return Math.floor(365.25*(Y+4716))+Math.floor(30.6001*(M+1))+D+B-1524.5+h/24;}
function _kepler(M_deg,e){let M=_n360(M_deg)*D2R,E=M;for(let k=0;k<100;k++){const dE=(M-E+e*Math.sin(E))/(1-e*Math.cos(E));E+=dE;if(Math.abs(dE)<1e-12)break;}return E;}
function _helio(N,i,w,a,e,M_deg){
const E=_kepler(M_deg,e),xv=Math.cos(E)-e,yv=Math.sqrt(1-e*e)*Math.sin(E);
const v=Math.atan2(yv,xv),r=a*Math.sqrt(xv*xv+yv*yv);
const Nr=N*D2R,ir=i*D2R,wvr=w*D2R+v;
return{xh:r*(Math.cos(Nr)*Math.cos(wvr)-Math.sin(Nr)*Math.sin(wvr)*Math.cos(ir)),
yh:r*(Math.sin(Nr)*Math.cos(wvr)+Math.cos(Nr)*Math.sin(wvr)*Math.cos(ir)),
zh:r*Math.sin(wvr)*Math.sin(ir)};
}

}

'Neptune':gL(_n360(131.7806+3.0173e-5*d),1.77,_n360(272.8461-6.027e-6*d),30.05826,0.008606,260.247+0.005995*d),
'Pluto':gL(_n360(110.303+3.9e-5*d),17.14175,_n360(113.763-9.4e-6*d),39.48168,0.2488,14.82+0.003981*d)

function getPlanetOrbBase(p,aspectIdx){
const isConjOpp=(aspectIdx===0||aspectIdx===4);
const isTriSq=(aspectIdx===2||aspectIdx===3);
if(p==='Sun'||p==='Moon') return isConjOpp?10:isTriSq?8:6;
if(p==='Mercury'||p==='Venus'||p==='Mars') return isConjOpp?7:isTriSq?6:5;
if(p==='Jupiter'||p==='Saturn') return isConjOpp?5:isTriSq?5:3;
return isConjOpp?4:isTriSq?3:2;
}
function getDynamicOrb(p1,p2,aspectIdx){
return(getPlanetOrbBase(p1,aspectIdx)+getPlanetOrbBase(p2,aspectIdx))/2;
}

function findNatalAspects(positions,lkp){
const pList=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto'];
const found=[];
for(let i=0;i<pList.length;i++)for(let j=i+1;j<pList.length;j++){
const p1=pList[i],p2=pList[j];
let diff=Math.abs(positions[p1]-positions[p2]);
if(diff>180)diff=360-diff;
let best=null,bestDev=999;
for(const ad of ASPECT_DEFS){
const dynOrb=getDynamicOrb(p1,p2,ad.idx);
const dev=Math.abs(diff-ad.angle);

found.push({p1,p2,aspectIdx:best.idx,orb:bestDev.toFixed(1),ad:best});

return found;
}

<div className="bg-gray-800 rounded-lg px-3 py-2 space-y-1">

</div>

{planets.map(p=>(

</div>))}
</div>

{[p1,p2].map(p=>(

All aspects</button>
{aspects.map((a,i)=>(
<button key={a.name} onClick={()=>{setSelAspect(selAspect===i?null:i);setExpanded(null);setVectorOpen({});}}

{a.sym} {a.name} {a.deg}</button>))}

<div className="space-y-3">
{displayAspects.map(asp=>{

const isVOpen=!!vectorOpen[aIdx];

const ev=getEventData(p1,p2,aIdx);
const dynOrb=getDynamicOrb(p1,p2,aIdx).toFixed(1);
return(
<div key={asp.name} className={`rounded-xl border border-gray-700 overflow-hidden ${asp.bg}`}>
<button onClick={()=>setExpanded(isExpanded?null:aIdx)} className="w-full text-left px-4 py-3 flex items-center justify-between">

<div className="flex items-center gap-2 flex-wrap">

<span className="text-xs text-gray-500">{asp.deg}</span>
<span className="text-xs italic text-gray-500">{asp.desc}</span>
<span className="text-xs bg-gray-200 text-gray-600 px-1.5 py-0.5 rounded-full font-mono">orb ≤{dynOrb}°</span>
</div>
<p className="text-xs text-gray-600 mt-0.5">🧠 {entry.regions}</p>
</div>
</div>
<span className="text-gray-400 text-lg ml-2">{isExpanded?'▲':'▼'}</span>
</button>
<div className="px-4 pb-3"><p className="text-xs text-gray-700 leading-relaxed">{entry.experience}</p></div>
{isExpanded&&(
<div className="border-t border-gray-300 px-4 py-3 space-y-3">
<BrainViz regionsStr={entry.regions} p1={p1} p2={p2} pBrainMap={pBrain}/>
<EventCard ev={ev}/>
<ApothecaryCard p1={p1} p2={p2} aspectIdx={aIdx}/>
<ArtPharmacyCard p1={p1} p2={p2} aspectIdx={aIdx}/>
<div className="flex items-center gap-2"><div className="flex-1 h-px bg-gray-300"/><span className="text-xs text-gray-400 font-medium">🧬 Neuroscience</span><div className="flex-1 h-px bg-gray-300"/></div>
<div className="grid grid-cols-1 gap-2">

<div className="bg-white bg-opacity-60 rounded-lg p-3"><p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">→ Signal Flow</p><p className="text-xs text-gray-800 font-mono leading-relaxed">{entry.flow}</p></div>
<div className="bg-white bg-opacity-60 rounded-lg p-3"><p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">⚗️ Neurotransmitters</p><p className="text-xs text-gray-800">{entry.nt}</p></div>
</div>
<div className="bg-white bg-opacity-70 rounded-lg p-3 border-l-4 border-orange-400"><p className="text-xs font-bold text-orange-600 uppercase tracking-wide mb-1">⚡ Kinetics · Body Action</p><p className="text-xs text-gray-800 leading-relaxed">{kineticTip}</p></div>
<div className="bg-white bg-opacity-70 rounded-lg p-3 border-l-4 border-teal-400"><p className="text-xs font-bold text-teal-600 uppercase tracking-wide mb-2">🫀 Bio-Resource · Focus Areas</p><p className="text-xs text-gray-700"><span className="font-semibold">Organs: </span>{bioInfo.organs}</p><p className="text-xs text-gray-700 mt-1"><span className="font-semibold">Recovery: </span>{bioInfo.rest}</p></div>
