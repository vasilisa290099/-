function detectAffectiveFlickeringAxis(aspects){
  let dissolveScore=0,sharpScore=0;const activeFactors=[];
  aspects.forEach(asp=>{
    const key=conjKey(asp.p1,asp.p2);const pd=AFFECTIVE_AXIS_PAIRS[key];if(!pd)return;
    const genMult=pd.gen?0.35:1.0;const tenseMult=asp.tense?1.2:0.85;const orbFactor=Math.max(0.25,1-asp.orb/12);const w=pd.weight*genMult*tenseMult*orbFactor;
    if(pd.pole==='A')dissolveScore+=w;else if(pd.pole==='B')sharpScore+=w;else{dissolveScore+=w*0.5;sharpScore+=w*0.5;}
    activeFactors.push({pair:key,p1:asp.p1,p2:asp.p2,aspect:asp.name,sym:asp.sym,orb:asp.orb,weight:+w.toFixed(2),pole:pd.pole,tense:asp.tense,gen:!!pd.gen,label:pd.label});
  });
  const totalScore=dissolveScore+sharpScore;if(totalScore<1.2)return null;
  const dissolveRatio=dissolveScore/(totalScore||1);const polePosition=Math.round((1-dissolveRatio)*100);const dominantPole=dissolveRatio>0.62?'A':dissolveRatio<0.38?'B':'mixed';const intensity=Math.min(1.0,totalScore/7);

  // ── NEW v7.2: Power Vector Computation ──────────────────────────
  const hasMoonNeptune=activeFactors.some(f=>f.pair==='Moon_Neptune'&&!f.gen);
  const hasVenusNeptune=activeFactors.some(f=>f.pair==='Neptune_Venus'&&!f.gen);
  const hasMoonUranus=activeFactors.some(f=>f.pair==='Moon_Uranus'&&!f.gen);
  const hasVenusUranus=activeFactors.some(f=>f.pair==='Uranus_Venus'&&!f.gen);
  // Double Capture: both Moon AND Venus primed through Uranus → Pole B
  const isDoubleCapture=hasMoonUranus&&hasVenusUranus;

  let powerVector='',dominantCarrier='';
  if(isDoubleCapture){
    powerVector='liberated';dominantCarrier='both';
  }else if(dominantPole==='B'){
    powerVector='outward';
    dominantCarrier=hasVenusUranus?'Venus':(hasMoonUranus?'Moon':'generic');
  }else if(dominantPole==='A'){
    powerVector='inward';
    dominantCarrier=hasMoonNeptune?'Moon':(hasVenusNeptune?'Venus':'Moon');
  }else{
    // mixed: check which side weighs more
    if(dissolveScore>=sharpScore){
      powerVector='inward';dominantCarrier=hasMoonNeptune?'Moon':(hasVenusNeptune?'Venus':'Moon');
    }else{
      powerVector='outward';dominantCarrier=hasVenusUranus?'Venus':(hasMoonUranus?'Moon':'generic');
    }
  }
  // ────────────────────────────────────────────────────────────────

  return{
    active:true,score:+totalScore.toFixed(2),intensity,
    activeFactors:activeFactors.sort((a,b)=>b.weight-a.weight),
    dissolveScore:+dissolveScore.toFixed(2),sharpScore:+sharpScore.toFixed(2),
    polePosition,dominantPole,
    // v7.2 fields:
    powerVector,dominantCarrier,isDoubleCapture,
    hasMoonNeptune,hasMoonUranus,hasVenusUranus,hasVenusNeptune
  };
}

  const calc=useCallback(()=>{
    setErr('');
    const parse=v=>{const d=parseInt(v.day),m=parseInt(v.month),y=parseInt(v.year);if(!d||!m||!y||m<1||m>12||d<1||d>31||y<1800||y>2100)return null;return{d,m,y};};
    const p1=parse(me),p2=parse(them);
    if(!p1||!p2){setErr('Enter valid dates (year from 1800)');return;}
    try{
      const{pos:pos1,signs:sgn1}=calcPlanets(p1.y,p1.m,p1.d);const{pos:pos2,signs:sgn2}=calcPlanets(p2.y,p2.m,p2.d);
      setMeP(calcProfile(findAspects(pos1,sgn1),sgn1,pos1));setThemP(calcProfile(findAspects(pos2,sgn2),sgn2,pos2));
      setStep(1);setSit(null);setRevealed(false);
    }catch(e){setErr('Calculation error. Check dates.');}
  },[me,them]);

  const meSub=useMemo(()=>meP?getSubProfile(meP):null,[meP]);
  const themSub=useMemo(()=>themP?getSubProfile(themP):null,[themP]);
  const resonance=useMemo(()=>meP&&themP?detectResonance(meP,themP):null,[meP,themP]);
  const goalCfg=GOALS.find(g=>g.id===goal);
  const translation=useMemo(()=>{if(!sit||!meSub||!themSub)return null;const nat=NATURAL[meSub.primary]?.[sit]||'...';const tr=makeTranslation(meSub,themSub,sit,goal,resonance);return{nat,...tr};},[sit,goal,meSub,themSub,resonance]);
  const sitCfg=SITS.find(s=>s.id===sit);

  return(
    <div className="min-h-screen bg-gray-950 text-white">
      <div className="px-4 py-3 text-center border-b border-purple-900" style={{background:'linear-gradient(135deg,#1e1040,#2d1060,#1e1040)'}}>
        <div className="flex items-center justify-center gap-2 mb-1"><Brain size={12} className="text-purple-400"/><p className="text-xs text-purple-400 uppercase tracking-widest font-bold">Biochemical Resonance · Eva White</p></div>
        <h1 className="text-xl font-black text-white">Neuro-Translator: Biochemical Resonance</h1>
        <p className="text-xs text-purple-300 mt-0.5">v7.2 · Power Vector · Interface Hierarchy · 120 translations · Transits · From 1800</p>
        <div className="mt-2 flex flex-wrap items-center justify-center gap-1">
          {[{lb:'🎯 Power Vector',clr:'#22c55e'},{lb:'🏗 Hierarchy',clr:'#fdba74'},{lb:'120 translations',clr:'#22c55e'},{lb:'6×2×10',clr:'#fdba74'},{lb:'🕐 Transits',clr:'#67e8f9'},{lb:'≋ Flicker axis',clr:'#a78bfa'},{lb:'From 1800',clr:'#f97316'},{lb:'🧬 AI Report',clr:'#c084fc'}].map(t=>(<span key={t.lb} className="px-2 py-0.5 rounded-full border" style={{color:t.clr,borderColor:t.clr+'44',background:t.clr+'10',fontSize:'8px'}}>{t.lb}</span>))}
        </div>
      </div>

      <div className="max-w-lg mx-auto px-4 py-4 space-y-4">
        <div className="space-y-3">
          <div className="flex items-center gap-2"><div className="w-5 h-5 rounded-full bg-purple-600 flex items-center justify-center text-white text-xs font-black">1</div><p className="text-sm font-bold text-white">Birth Dates</p></div>
          <DateInput label="Me" em="👤" val={me} onChange={setMe}/>
          <DateInput label="Opponent / Close Person" em="👥" val={them} onChange={setThem}/>
          {err&&<p className="text-red-400 text-xs bg-red-950 rounded-lg px-3 py-2 border border-red-900">{err}</p>}
          <button onClick={calc} className="w-full py-3 rounded-xl font-black text-white text-sm" style={{background:'linear-gradient(90deg,#7c3aed,#a855f7)'}}>Calculate Neuroprofiles</button>
        </div>

        {step>=1&&(
          <div className="space-y-3 anim-fade-up">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-2"><div className="w-5 h-5 rounded-full bg-purple-600 flex items-center justify-center text-white text-xs font-black">2</div><p className="text-sm font-bold text-white">Neuroprofiles</p></div>
              <button onClick={()=>setExpert(e=>!e)} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold border transition-all" style={{borderColor:expert?'#6366f1':'#374151',background:expert?'rgba(99,102,241,0.2)':'transparent',color:expert?'#a5b4fc':'#6b7280'}}>{expert?<EyeOff size={12}/>:<Eye size={12}/>}{expert?'Hide':'Full Analysis'}</button>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <ProfileCard profile={meP} label="👤 Me" showExpert={expert}/>
              <ProfileCard profile={themP} label="👥 Partner" showExpert={expert}/>
            </div>
            {meSub&&themSub&&(<div className="rounded-xl border border-indigo-800 p-3 space-y-3" style={{background:'rgba(49,46,129,0.2)'}}>
              <p className="text-xs font-black text-indigo-300 uppercase tracking-wider">Neurochemical Pair Analysis</p>
              <div className="grid grid-cols-2 gap-2">
                <div className="rounded-lg p-2" style={{background:meSub.freqClr+'12',borderLeft:`3px solid ${meSub.freqClr}`}}><p className="font-bold" style={{color:meSub.freqClr,fontSize:'10px'}}>{meSub.em} I speak</p><p className="text-xs text-gray-300 mt-1">«{meSub.speaks}»</p></div>
                <div className="rounded-lg p-2" style={{background:themSub.freqClr+'12',borderLeft:`3px solid ${themSub.freqClr}`}}><p className="font-bold" style={{color:themSub.freqClr,fontSize:'10px'}}>{themSub.em} They hear</p><p className="text-xs text-gray-300 mt-1">filter: «{themSub.hears}»</p><p className="text-gray-700 mt-0.5" style={{fontSize:'9px'}}>trigger: «{themSub.trigger}»</p></div>
              </div>
              {/* Power Vector Pair Comparison */}
              {(meP?.affectiveAxis?.active||themP?.affectiveAxis?.active)&&(
                <div className="rounded-lg p-2" style={{background:'rgba(129,140,248,0.08)',border:'1px solid rgba(129,140,248,0.25)'}}>
                  <p className="font-black text-indigo-300 mb-1.5" style={{fontSize:'9px'}}>≋ POWER VECTORS · Pair</p>
                  <div className="grid grid-cols-2 gap-2">
                    {[{p:meP,l:'Me'},{p:themP,l:'Partner'}].map(({p,l})=>{
                      const aa=p?.affectiveAxis;if(!aa?.active)return(<div key={l} className="rounded px-2 py-1.5" style={{background:'rgba(0,0,0,0.3)'}}><p style={{fontSize:'8px',color:'#4b5563'}}>{l}: no axis</p></div>);
                      const pvClr=aa.powerVector==='liberated'?'#67e8f9':aa.powerVector==='outward'?'#22c55e':'#f97316';
                      const pvIcon=aa.powerVector==='liberated'?'∞':aa.powerVector==='outward'?'↗':'↩';
                      return(<div key={l} className="rounded px-2 py-1.5" style={{background:`${pvClr}10`,border:`1px solid ${pvClr}30`}}><p style={{fontSize:'8px',color:'#6b7280'}}>{l}</p><p className="font-black" style={{fontSize:'10px',color:pvClr}}>{pvIcon} {aa.powerVector}</p><p style={{fontSize:'7px',color:pvClr,opacity:0.8}}>{aa.dominantCarrier} carrier</p></div>);
                    })}
                  </div>
                </div>
              )}
              {resonance&&(<div className={`rounded-lg px-3 py-2 border ${resonance.alert?'border-red-900 bg-red-950':'border-yellow-900 bg-yellow-950'}`} style={{opacity:0.85}}>{resonance.alert&&<AlertTriangle size={12} className="text-red-400 inline mr-1.5"/>}<p className="font-bold" style={{color:resonance.alert?'#f87171':'#fbbf24',fontSize:'10px'}}>{resonance.type==='resonance'?'Tension Resonance':resonance.type==='differentPersonal'?'Same base — different operators':'Same circuit — different frequencies'}</p><p className="text-gray-400 mt-1" style={{fontSize:'10px'}}>{resonance.msg}</p></div>)}
              <button onClick={()=>setStep(2)} className="w-full py-2.5 rounded-xl font-black text-sm text-white" style={{background:'linear-gradient(90deg,#4f46e5,#7c3aed)'}}>Open Translator</button>
              <GenerateReportButton meProfile={meP} themProfile={themP} transits={[]}/>
            </div>)}
          </div>
        )}

        {step>=2&&meSub&&themSub&&(
          <div className="space-y-3 anim-fade-up">
            <div className="flex items-center gap-2"><div className="w-5 h-5 rounded-full bg-purple-600 flex items-center justify-center text-white text-xs font-black">3</div><p className="text-sm font-bold text-white">Translator · 6 Situations</p></div>
            <div className="grid grid-cols-2 gap-2">{GOALS.map(g=>{const active=goal===g.id;return(<button key={g.id} onClick={()=>{setGoal(g.id);setRevealed(false);}} className="p-3 rounded-xl border text-left transition-all" style={{borderColor:active?g.clr:'#374151',background:active?g.clr+'1a':'rgba(17,24,39,0.5)'}}><g.Icon size={16} style={{color:active?g.clr:'#6b7280'}}/><p className="text-sm font-black mt-1" style={{color:active?g.clr:'#9ca3af'}}>{g.lb}</p><p className="text-xs text-gray-600">{g.sub}</p></button>);})}</div>
            <div className="grid grid-cols-3 gap-2">{SITS.map(s=>(<button key={s.id} onClick={()=>{setSit(s.id);setRevealed(false);}} className={`p-2 rounded-xl border text-left transition-all ${sit===s.id?'border-purple-500 bg-purple-900':'border-gray-700 bg-gray-900'}`}><span className="text-lg">{s.em}</span><p className="text-white font-bold mt-1" style={{fontSize:'9px'}}>{s.lb}</p><p className="text-gray-600" style={{fontSize:'8px'}}>{s.sub}</p></button>))}</div>

            {sit&&translation&&(
              <div key={`${sit}_${goal}`} className="space-y-2 anim-fade-up">
                <div className="rounded-xl p-3 border" style={{borderColor:meSub.freqClr+'33',background:meSub.freqClr+'0d'}}>
                  <p className="font-black uppercase tracking-wider mb-2" style={{color:meSub.freqClr,fontSize:'10px'}}>{meSub.em} {meSub.freq} · {sitCfg?.em} {sitCfg?.lb}</p>
                  <p className="text-sm text-white italic font-medium leading-relaxed">{translation.nat}</p>
                </div>
                <div className="flex items-center gap-2"><div className="flex-1 h-px bg-gray-800"/><span className="font-bold text-red-500" style={{fontSize:'10px'}}>neurochemical gap</span><div className="flex-1 h-px bg-gray-800"/></div>
                <div className="rounded-xl p-3 border border-red-900 bg-red-950" style={{opacity:0.85}}>
                  <p className="text-red-400 uppercase tracking-wider mb-2" style={{fontSize:'10px'}}>{themSub.em} their filter: «{themSub.hears}»</p>
                  <p className="text-sm text-red-200 italic leading-relaxed">«{themSub.hears}» vs delivery «{meSub.speaks}»</p>
                  <p className="text-red-900 mt-1" style={{fontSize:'10px'}}>trigger: «{themSub.trigger}»</p>
                </div>
                {themP?.captured&&(<div className="rounded-xl p-3 border border-red-900" style={{background:'rgba(239,68,68,0.12)'}}><p className="text-red-400 font-bold flex items-center gap-1" style={{fontSize:'10px'}}><Lock size={10}/> Ukhtomsky Dominance · {getDominantaDesc(themP.primary)}</p><p className="text-gray-400 mt-1" style={{fontSize:'10px'}}>Contact possible with safety protocol · written channel recommended.</p></div>)}
                {resonance?.alert&&(<div className="rounded-xl p-3 border border-red-900" style={{background:'rgba(239,68,68,0.1)'}}><p className="text-red-400 font-bold flex items-center gap-1" style={{fontSize:'10px'}}><AlertTriangle size={10}/>Tension Resonance</p><p className="text-gray-400 mt-1" style={{fontSize:'10px'}}>Identical circuits. Direct communication will amplify conflict.</p></div>)}
                {!revealed?(
                  <button onClick={()=>setRevealed(true)} className="w-full py-3 rounded-xl font-black text-sm text-white" style={{background:`linear-gradient(90deg,${goalCfg?.clr},${goalCfg?.clr}aa)`}}>
                    {goal==='win'?'🎯 How to say it — Defense':'🤝 How to say it — Agreement'}
                  </button>
                ):(
                  <div className="rounded-xl border p-4 space-y-3 anim-scale-in" style={{borderColor:goalCfg?.clr+'66',background:goalCfg?.clr+'0d'}}>
                    <div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full" style={{background:goalCfg?.clr}}/><p className="font-black uppercase tracking-wider" style={{color:goalCfg?.clr,fontSize:'10px'}}>{themSub.em} {themSub.freq} · {sitCfg?.em} {sitCfg?.lb}</p></div>
                    {translation.sitHint&&(<div className="rounded-lg px-3 py-2" style={{background:`${goalCfg?.clr}12`,border:`1px solid ${goalCfg?.clr}33`}}><p className="text-white text-sm leading-relaxed font-medium">{translation.sitHint}</p></div>)}
                    <div className="space-y-1" style={{borderLeft:`3px solid ${themSub.freqClr}55`,paddingLeft:8}}>
                      <p className="font-black" style={{color:themSub.freqClr,fontSize:'10px'}}>↳ {translation.genHint}</p>
                      <p style={{fontSize:'9px',color:'#4b5563'}}>{translation.extra}</p>
                    </div>
                    <button onClick={()=>setRevealed(false)} className="text-gray-700 underline" style={{fontSize:'10px'}}>Different situation</button>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {step>=1&&(<div className="rounded-xl border border-gray-800 p-4 text-center" style={{background:'#07031a'}}>
          <p className="text-white font-black text-sm mb-1">Neuro-Translator: Biochemical Resonance · v7.2</p>
          <div className="flex flex-wrap justify-center gap-1 mt-1">{[{t:'🎯 Power Vector',c:'#22c55e'},{t:'🏗 Hierarchy',c:'#fdba74'},{t:'120 translations',c:'#22c55e'},{t:'Transits',c:'#67e8f9'},{t:'≋ Axis',c:'#818cf8'},{t:'From 1800',c:'#f97316'},{t:'🧬 AI Report',c:'#c084fc'},{t:'Done ✓',c:'#a78bfa'}].map(x=>(<span key={x.t} style={{fontSize:'8px',color:x.c,background:x.c+'12',padding:'2px 6px',borderRadius:4}}>{x.t}</span>))}</div>
          <p className="text-purple-400 text-xs font-bold mt-2">Biochemical Resonance · Eva White · v7.2 ❤️</p>
        </div>)}
        <div className="text-center py-2"><p className="text-gray-800 text-xs">Biochemical Resonance · Eva White · 2025 · v7.2</p></div>
      </div>
    </div>
  );
}

const _root=ReactDOM.createRoot(document.getElementById('root'));
_root.render(React.createElement(NeuroTranslatorV72EN));
</script>
</body>
